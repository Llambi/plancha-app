# Banco de preguntas DAR — generado por scripts/migrate-dar.mjs
# REGLA: contenido transcrito VERBATIM desde legacy/dar.html. No editar a mano.
# 257 preguntas · tipo single · nota: el barajado (opciones/preguntas)
# es responsabilidad del componente de render, no de los datos.
- id: q1
  asignatura: dar
  type: single
  question: ¿De qué estándar surge el lenguaje HTML?
  options:
    - XML, como una versión simplificada para la web.
    - SGML, como estándar general de marcado.
    - Markdown, como lenguaje ligero de marcado.
    - La especificación ECMAScript del W3C.
  correct:
    - 1
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: El lenguaje HTML se deriva de las reglas del SGML (Standard Generalized Markup Language), que es el estándar padre de los lenguajes de marcado con intención declarativa [1, 2].
- id: q2
  asignatura: dar
  type: single
  question: "Un documento HTML:"
  options:
    - Se limita a etiquetas HTML y no admite integración con otros lenguajes.
    - Solo puede incluir JavaScript, pero no CSS.
    - Combina HTML con otros lenguajes.
    - Es un documento de texto plano sin estructura.
  correct:
    - 2
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: Un documento web moderno es una combinación de etiquetas de marcado (HTML), lógica de programación (JavaScript) y hojas de estilo (CSS) para definir su apariencia [1, 12].
- id: q3
  asignatura: dar
  type: single
  question: "Mejoras de HTML5 respecto a HTML:"
  options:
    - Incorpora tag para definir diálogos y conversaciones.
    - Elimina por completo los formularios, sustituyéndolos por JSON.
    - Impide el uso de multimedia sin plugins externos.
    - Sustituye CSS por atributos de estilo obligatorios.
  correct:
    - 0
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: HTML5 introduce nuevas etiquetas semánticas para mejorar la estructura del contenido, incluyendo aquellas para definir diálogos y conversaciones entre personas [13, 14].
- id: q4
  asignatura: dar
  type: single
  question: "La etiqueta <img> sirve para:"
  options:
    - Crear un contenedor para imágenes como si fuera un <div>.
    - Insertar una imagen.
    - Insertar un vídeo en formato MP4.
    - Definir un mapa del sitio para buscadores.
  correct:
    - 1
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: La función básica y específica de la etiqueta <img> es permitir la inserción de recursos gráficos en el documento [14, 15].
- id: q5
  asignatura: dar
  type: single
  question: "En un formulario HTML, el campo action:"
  options:
    - Define el método de envío (GET o POST).
    - Indica la página a la que se envían los datos.
    - Indica el tipo MIME del formulario.
    - Bloquea el envío hasta validar con CSS.
  correct:
    - 1
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: El atributo 'action' especifica la URL del destino o script de servidor al que se remitirá la información recolectada para su procesamiento [16, 17].
- id: q6
  asignatura: dar
  type: single
  question: "La etiqueta <head> permite:"
  options:
    - Insertar el contenido visible principal de la página.
    - Introducir metadatos sobre el documento.
    - Incluir únicamente enlaces de navegación.
    - Definir el pie de página del documento.
  correct:
    - 1
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: La sección <head> contiene información no visible directamente, como el título y los metadatos que ayudan a los navegadores y buscadores a interpretar la página [17, 18].
- id: q7
  asignatura: dar
  type: single
  question: "Las etiquetas semánticas de HTML5 buscan:"
  options:
    - Eliminar el uso de JavaScript en la web.
    - Sustituir la necesidad de usar <div> para identificar cada bloque.
    - Convertir HTML en un lenguaje de programación completo.
    - Obligar a usar tablas para el diseño.
  correct:
    - 1
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: HTML5 introduce etiquetas como <header>, <nav> o <article> para dar significado real a la estructura, evitando el abuso de etiquetas <div> carentes de semántica [19, 20].
- id: q8
  asignatura: dar
  type: single
  question: "Para representar contenido en un párrafo se usa:"
  options:
    - <p>.
    - <span>.
    - <br>.
    - <h1>.
  correct:
    - 0
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: La etiqueta <p> es el elemento estándar para delimitar un bloque de texto como párrafo, insertando un espacio vertical automático al finalizar [20, 21].
- id: q9
  asignatura: dar
  type: single
  question: ¿Qué etiqueta define una lista no ordenada?
  options:
    - <ol>.
    - <ul>.
    - <li>.
    - <dl>.
  correct:
    - 1
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: Las siglas <ul> corresponden a 'Unordered List', utilizada para listados donde el orden no es relevante (viñetas), a diferencia de <ol> que es para listas numeradas [20, 22].
- id: q10
  asignatura: dar
  type: single
  question: "Los lenguajes de marcado se centran en:"
  options:
    - La compilación del código a binario.
    - La estructuración del contenido.
    - El acceso directo a memoria y punteros.
    - El control de procesos del sistema operativo.
  correct:
    - 1
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: A diferencia de los lenguajes de programación que ejecutan lógica, los de marcado tienen una intención declarativa enfocada en cómo se organiza la información [2, 23].
- id: q11
  asignatura: dar
  type: single
  question: "XHTML se diferencia de HTML en que:"
  options:
    - Permite omitir siempre el cierre de etiquetas.
    - No sigue ninguna regla de sintaxis estricta.
    - No posee un conjunto de etiquetas predefinido.
    - Es un lenguaje de hojas de estilo.
  correct:
    - 2
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: XHTML es una variante basada en XML que requiere una sintaxis mucho más estricta y no tiene un conjunto de etiquetas predefinido de la misma forma que el estándar HTML tradicional [2, 23].
- id: q12
  asignatura: dar
  type: single
  question: ¿Es obligatorio cerrar las etiquetas en HTML5?
  options:
    - No, nunca se cierran etiquetas en HTML5.
    - Solo se cierran etiquetas si llevan atributos.
    - Sí, para mantener la intención declarativa y el rigor estructural.
    - Solo se cierran en documentos JSON-LD.
  correct:
    - 2
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: Aunque algunos navegadores son permisivos, el estándar HTML5 promueve el cierre de etiquetas para garantizar que la estructura del documento sea consistente y válida [24, 25].
- id: q13
  asignatura: dar
  type: single
  question: ¿Qué elemento de HTML5 se usa para dibujos y gráficos?
  options:
    - <svg>.
    - <img>.
    - <canvas>.
    - <style>.
  correct:
    - 2
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: La etiqueta <canvas> proporciona un espacio en la web donde se pueden generar gráficos dinámicos y animaciones mediante scripts, generalmente JavaScript [25, 26].
- id: q14
  asignatura: dar
  type: single
  question: "El atributo method en formularios suele aceptar:"
  options:
    - PUT y DELETE.
    - FTP y SMTP.
    - GET y POST.
    - TCP y UDP.
  correct:
    - 2
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: En el protocolo HTTP, los métodos estándar para el envío de datos desde un formulario son GET (datos en la URL) y POST (datos en el cuerpo del mensaje) [25, 27].
- id: q15
  asignatura: dar
  type: single
  question: ¿Qué etiqueta de HTML5 define un bloque de contenido independiente (como un post)?
  options:
    - <section>.
    - <div>.
    - <article>.
    - <aside>.
  correct:
    - 2
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: La etiqueta <article> está diseñada específicamente para agrupar contenido que tiene sentido por sí mismo y podría ser distribuido de forma independiente, como noticias o posts [28, 29].
- id: q16
  asignatura: dar
  type: single
  question: "HTML y CSS se centran respectivamente en:"
  options:
    - Presentación y lógica de negocio.
    - Estructura y presentación.
    - Acceso a datos y seguridad.
    - Compilación y ejecución.
  correct:
    - 1
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: "El objetivo fundamental del desarrollo web moderno es separar el código: HTML define qué elementos hay (estructura) y CSS define cómo se ven (presentación) [29, 30]."
- id: q17
  asignatura: dar
  type: single
  question: "CSS3 agrega funcionalidades como:"
  options:
    - Gestión de sesiones y cookies.
    - Control de procesos en segundo plano.
    - Rotación, múltiples fondos y redondeo de bordes.
    - Compilación a bytecode.
  correct:
    - 2
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: CSS3 mejora significativamente las capacidades visuales permitiendo aplicar sombras, redondeo de esquinas (border-radius) y transformaciones como rotaciones sin necesidad de imágenes externas [29, 31].
- id: q18
  asignatura: dar
  type: single
  question: ¿Qué código HTML5 enlaza una hoja de estilo externa?
  options:
    - <style src='estilo.css'>\/style>
    - <css link='estilo.css'>
    - <link rel='stylesheet' href='estilo.css'>
    - <script rel='stylesheet' href='estilo.css'>\/script>
  correct:
    - 2
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: Para vincular un archivo .css externo se utiliza la etiqueta <link> dentro del <head>, especificando que la relación es una hoja de estilos ('stylesheet') [32, 33].
- id: q19
  asignatura: dar
  type: single
  question: "Ventaja del enlace externo en CSS:"
  options:
    - Impide que el navegador use caché.
    - Permite cambios globales afectando a todas las páginas vinculadas.
    - Obliga a escribir los estilos dentro del HTML.
    - Solo funciona en HTML5, no en HTML4.
  correct:
    - 1
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: Al tener los estilos en un archivo separado, cualquier cambio realizado en ese único fichero se refleja instantáneamente en todo el sitio web, optimizando el mantenimiento [30, 33].
- id: q20
  asignatura: dar
  type: single
  question: "Los selectores CSS universales usan el símbolo:"
  options:
    - "*."
    - "#."
    - .
    - "@"
  correct:
    - 0
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: El asterisco '*' actúa como selector universal en CSS, lo que significa que las propiedades definidas bajo este selector afectarán a todas las etiquetas del documento [34, 35].
- id: q21
  asignatura: dar
  type: single
  question: "Un identificador (id) en CSS:"
  options:
    - Puede repetirse infinitas veces en la misma página.
    - No puede repetirse en el mismo documento.
    - Solo puede aplicarse a etiquetas <div>.
    - Sustituye a las clases en CSS3.
  correct:
    - 1
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: A diferencia de las clases, el atributo 'id' debe ser único dentro de cada página HTML para identificar de forma inequívoca a un solo elemento [35, 36].
- id: q22
  asignatura: dar
  type: single
  question: "Las clases (class) en CSS:"
  options:
    - Solo pueden usarse una vez por documento.
    - Se aplican automáticamente sin declararlas en HTML.
    - Pueden usarse en múltiples etiquetas.
    - Son exclusivas del <head>.
  correct:
    - 2
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: Las clases permiten agrupar varios elementos bajo un mismo estilo visual, pudiendo repetirse el atributo 'class' en tantas etiquetas como sea necesario [35, 36].
- id: q23
  asignatura: dar
  type: single
  question: "CSS3 introduce el canal alfa para:"
  options:
    - Definir el tamaño de fuente.
    - La transparencia.
    - Mejorar la velocidad del servidor.
    - Establecer el orden de carga del HTML.
  correct:
    - 1
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: El canal alfa (parámetro 'a' en RGBA o HSLA) permite definir el grado de opacidad de un color, habilitando efectos de transparencia en los elementos [37, 38].
- id: q24
  asignatura: dar
  type: single
  question: "Las pseudo-clases permiten:"
  options:
    - Cambiar el HTML del servidor.
    - Definir nuevos elementos HTML dinámicos.
    - Clasificar elementos según su estado (ej. hover).
    - Convertir CSS en un lenguaje de programación.
  correct:
    - 2
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: Las pseudo-clases se utilizan para aplicar estilos a elementos basándose en acciones del usuario o estados, como cuando el ratón pasa por encima de un enlace (:hover) [38, 39].
- id: q25
  asignatura: dar
  type: single
  question: ¿Qué propiedad de CSS3 genera bordes redondeados?
  options:
    - border-style.
    - border-radius.
    - outline.
    - padding.
  correct:
    - 1
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: La propiedad 'border-radius' permite definir el radio de las esquinas de un elemento para que luzcan redondeadas, una de las mejoras estéticas clave de CSS3 [38, 40].
- id: q26
  asignatura: dar
  type: single
  question: "text-shadow en CSS3 sirve para:"
  options:
    - Cambiar el tipo de letra por una fuente externa.
    - Ajustar el interlineado del texto.
    - Sombrear textos.
    - Crear bordes redondeados en el texto.
  correct:
    - 2
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: Esta propiedad permite añadir una o varias sombras al texto de un elemento, especificando su desplazamiento, difuminado y color [41, 42].
- id: q27
  asignatura: dar
  type: single
  question: ¿Qué es un gradiente en CSS3?
  options:
    - Un tipo de fuente especial para títulos.
    - Un script que genera colores aleatorios.
    - Una transición entre al menos dos colores.
    - Un borde que se dibuja con puntos.
  correct:
    - 2
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: Los gradientes son rellenos que muestran una transición suave entre diferentes colores, pudiendo ser lineales o radiales [40, 42].
- id: q28
  asignatura: dar
  type: single
  question: "Las transformaciones en CSS3 permiten:"
  options:
    - Ejecutar lógica condicional en el navegador.
    - Realizar cambios geométricos a los elementos.
    - Modificar la estructura del DOM en tiempo real.
    - Sustituir imágenes por texto automáticamente.
  correct:
    - 1
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: Las transformaciones permiten modificar la geometría de los elementos mediante rotaciones, escalados, inclinaciones o traslaciones en el espacio 2D o 3D [40, 42].
- id: q29
  asignatura: dar
  type: single
  question: ¿Se recomienda incluir estilos dentro de la etiqueta HTML?
  options:
    - Sí, porque mejora la reutilización.
    - Sí, porque aumenta la velocidad del servidor.
    - No, se prefiere la separación total de contenido y estilo.
    - Solo si se usa Bootstrap.
  correct:
    - 2
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: La buena práctica dicta que el estilo debe estar separado en archivos externos (.css) para facilitar la escalabilidad y limpieza del código [30, 43].
- id: q30
  asignatura: dar
  type: single
  question: ¿Qué selector se usa para un elemento con un ID específico?
  options:
    - El símbolo .
    - El símbolo *
    - "El símbolo #"
    - El símbolo @
  correct:
    - 2
  tema: "Tema 2: Introducción a hojas de estilo CSS"
  explicacion: En CSS, para seleccionar un elemento por su identificador único se antepone el símbolo de almohadilla (#) al nombre del ID [36, 43].
- id: q31
  asignatura: dar
  type: single
  question: "El lenguaje JavaScript normalmente se ejecuta en:"
  options:
    - El cliente.
    - El servidor exclusivamente.
    - El router de red.
    - El compilador del sistema operativo.
  correct:
    - 0
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: JavaScript es un lenguaje de programación que se procesa en el navegador del usuario (lado del cliente) para proporcionar interactividad sin consultar constantemente al servidor [43, 44].
- id: q32
  asignatura: dar
  type: single
  question: "AJAX significa:"
  options:
    - Advanced JSON and XForms.
    - Asynchronous JavaScript and XML (o eXtensions en algunos textos).
    - Automatic Java and XHTML.
    - Assembled JavaScript and XHTML.
  correct:
    - 1
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: Es el acrónimo de Asynchronous JavaScript and XML, una técnica que combina varias tecnologías para permitir el asincronismo en la web [45, 46].
- id: q33
  asignatura: dar
  type: single
  question: ¿Qué problema resuelve AJAX?
  options:
    - Permite compilar JavaScript a C++ automáticamente.
    - Permite recargar áreas de la web sin recargar la página completa.
    - Sustituye HTTP por FTP en comunicaciones web.
    - Elimina la necesidad de usar CSS.
  correct:
    - 1
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: AJAX permite cargar datos en segundo plano y actualizar partes específicas de la interfaz de usuario, optimizando el tráfico y mejorando la fluidez de navegación [45, 46].
- id: q34
  asignatura: dar
  type: single
  question: "La sintaxis de JQuery se basa en:"
  options:
    - El objeto jQuery() o $().
    - El objeto document.queryCss().
    - El objeto window.ajax().
    - El objeto style.selector().
  correct:
    - 0
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: JQuery simplifica el desarrollo mediante el uso de este objeto global, al cual se le pasan selectores para manipular elementos del DOM de forma ágil [47, 48].
- id: q35
  asignatura: dar
  type: single
  question: ¿Qué aporta JQuery a la UX?
  options:
    - Sustituye HTML por un lenguaje binario.
    - Evita el uso del DOM en el navegador.
    - Interactividad como barras de menú, pestañas y búsquedas.
    - Obliga a recargar la página para cada acción.
  correct:
    - 2
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: Gracias a su capacidad para manejar eventos y animaciones, JQuery permite crear interfaces mucho más ricas y dinámicas que mejoran la experiencia del usuario (UX) [48, 49].
- id: q36
  asignatura: dar
  type: single
  question: "Pasos para activar AJAX:"
  options:
    - Llamada a JS, petición asíncrona, recuperación de datos, modificación de la página.
    - Cargar CSS, compilar HTML, reiniciar servidor, mostrar resultados.
    - Guardar cookies, cerrar sesión, reiniciar navegador, volver a entrar.
    - Definir tablas, migrar base de datos, lanzar servidor FTP, renderizar.
  correct:
    - 0
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: El flujo de AJAX implica iniciar una llamada de script, realizar la petición al servidor sin bloquear la página, obtener la respuesta y actualizar el contenido visualmente [48, 50].
- id: q37
  asignatura: dar
  type: single
  question: "El DOM es:"
  options:
    - Un lenguaje de programación para servidores.
    - Un sistema de bases de datos del navegador.
    - Una estructura arbórea que crea el navegador al cargar la web.
    - Un protocolo de red para intercambiar archivos.
  correct:
    - 2
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: El Document Object Model (DOM) es la representación jerárquica de todos los elementos de la página, la cual JavaScript utiliza para acceder y modificar el contenido dinámicamente [40, 51].
- id: q38
  asignatura: dar
  type: single
  question: "JavaScript es un lenguaje:"
  options:
    - Compilado a código máquina antes de ejecutarse.
    - Exclusivo para bases de datos relacionales.
    - De scripting e interpretado.
    - Diseñado para sustituir HTML.
  correct:
    - 2
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: JavaScript se clasifica como un lenguaje de scripting porque su código es interpretado directamente por el navegador en tiempo de ejecución, en lugar de requerir una compilación previa a binario [51, 52].
- id: q39
  asignatura: dar
  type: single
  question: "El objeto XMLHttpRequest es fundamental para:"
  options:
    - Definir estilos CSS dinámicos.
    - AJAX.
    - Sustituir el servidor por el cliente.
    - Ejecutar Java dentro del navegador.
  correct:
    - 1
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: Este objeto es la pieza central de AJAX, ya que proporciona la funcionalidad necesaria para realizar peticiones HTTP de forma asíncrona al servidor desde el navegador [53, 54].
- id: q40
  asignatura: dar
  type: single
  question: "JQuery utiliza selectores basados en:"
  options:
    - XPath.
    - CSS.
    - SQL.
    - FTP.
  correct:
    - 1
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: Una de las grandes ventajas de JQuery es que permite a los desarrolladores utilizar la misma sintaxis de selectores de CSS para encontrar y manipular elementos en el código JavaScript [54, 55].
- id: q41
  asignatura: dar
  type: single
  question: ¿Qué etiqueta avisa si JavaScript está bloqueado?
  options:
    - <nojs>
    - <noscript>
    - <script-blocked>
    - <js-off>
  correct:
    - 1
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: La etiqueta <noscript> se utiliza para mostrar contenido alternativo o mensajes de advertencia a aquellos usuarios que tienen deshabilitada la ejecución de scripts en sus navegadores [54].
- id: q42
  asignatura: dar
  type: single
  question: "En JQuery, el argumento de $( ) es un:"
  options:
    - Compilador.
    - Motor de renderizado.
    - Selector.
    - Tipo de dato binario.
  correct:
    - 2
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: El funcionamiento básico de JQuery consiste en pasar un 'selector' como argumento a su objeto principal para identificar qué partes del documento se desean afectar [47, 54].
- id: q43
  asignatura: dar
  type: single
  question: "JavaScript es de tipado:"
  options:
    - Fuerte y estático.
    - Débil o no tipado.
    - Solo numérico.
    - Exclusivo de enteros.
  correct:
    - 1
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: JavaScript es un lenguaje de tipado débil, lo que significa que no es necesario declarar el tipo de dato de una variable y este puede cambiar dinámicamente durante la ejecución [56].
- id: q44
  asignatura: dar
  type: single
  question: ¿Qué permite dotar de dinamismo a una web estática?
  options:
    - JavaScript.
    - HTML5.
    - CSS3.
    - SGML.
  correct:
    - 0
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: Mientras que HTML y CSS definen el contenido y su aspecto, JavaScript es el lenguaje que permite que la página responda a eventos y cambie su contenido sin recargar [56, 57].
- id: q45
  asignatura: dar
  type: single
  question: ¿Se puede incluir JS dentro del archivo HTML?
  options:
    - No, debe ir siempre en un archivo externo.
    - Sí, entre etiquetas <script>.
    - Solo si se usa XHTML estricto.
    - Solo dentro de <style>.
  correct:
    - 1
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: Aunque se recomienda el uso de archivos externos por orden, JavaScript permite incluir código directamente en el documento HTML utilizando el bloque contenedor <script> [52, 56].
- id: q46
  asignatura: dar
  type: single
  question: "Un componente es:"
  options:
    - Un único objeto sin interfaces.
    - Una colección de objetos que proporcionan servicios a diferentes sistemas.
    - Un archivo HTML con estilos embebidos.
    - Un script que solo se ejecuta en cliente.
  correct:
    - 1
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: En el paradigma de la POC, un componente se define como una unidad de software que encapsula funcionalidades y las expone para ser consumidas por otros sistemas [58, 59].
- id: q47
  asignatura: dar
  type: single
  question: "Estados de creación de un componente:"
  options:
    - Diseño, compilación, ejecución y depuración.
    - Construcción, despliegue, borrado y reinicio.
    - Análisis, prueba, mantenimiento y retirada.
    - Especificación, implementación, objeto y contratos.
  correct:
    - 3
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: El ciclo de creación de un componente requiere pasar por su definición abstracta, desarrollo técnico, existencia en el sistema y acuerdos legales de uso de su interfaz [59, 60].
- id: q48
  asignatura: dar
  type: single
  question: "Ventaja principal de la POC:"
  options:
    - Reutilización de código.
    - Sustituir completamente la POO.
    - Evitar el uso de interfaces.
    - Obligar a la herencia múltiple.
  correct:
    - 0
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: La principal motivación de la programación por componentes es asegurar que el código sea modular y pueda ser reutilizado en múltiples proyectos sin cambios internos [61, 62].
- id: q49
  asignatura: dar
  type: single
  question: "Diferencia entre objeto y componente:"
  options:
    - Un componente no puede reutilizarse.
    - Un objeto siempre se ejecuta en red y un componente no.
    - El componente es una entidad autónoma que exporta rendimiento y usa interfaces abiertas.
    - Un componente no tiene contratos ni interfaces.
  correct:
    - 2
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: A diferencia de un objeto simple de programación, el componente está diseñado para ser una pieza autónoma e independiente que se comunica mediante interfaces estandarizadas [62].
- id: q50
  asignatura: dar
  type: single
  question: "Reutilización de 'caja negra' significa:"
  options:
    - No se conoce la implementación interna, solo su interfaz.
    - Se conoce todo el código fuente y se modifica libremente.
    - Se reutiliza copiando y pegando el código en cada proyecto.
    - Solo se reutilizan variables globales.
  correct:
    - 0
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: Este concepto implica que el usuario del componente no necesita (ni puede) ver cómo está programado por dentro; simplemente confía en lo que la interfaz promete hacer [63, 64].
- id: q51
  asignatura: dar
  type: single
  question: "La POC es una variante de:"
  options:
    - Programación estructurada.
    - Programación funcional.
    - La Programación Orientada a Objetos (POO).
    - Programación lógica.
  correct:
    - 2
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: La POC surge como una evolución de la POO, cambiando el enfoque de la jerarquía de clases y la herencia por el de la composición y los servicios independientes [55, 64].
- id: q52
  asignatura: dar
  type: single
  question: "La interfaz de un componente es:"
  options:
    - Un archivo de configuración sin relación con el cliente.
    - El nexo de unión entre el cliente y la implementación.
    - Un conjunto de estilos CSS.
    - Un protocolo de red.
  correct:
    - 1
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: La interfaz define formalmente qué operaciones ofrece el componente y cómo debe ser invocado, actuando como el único punto de contacto para el desarrollador externo [65, 66].
- id: q53
  asignatura: dar
  type: single
  question: "Componentes con estado:"
  options:
    - Aquellos que no guardan datos nunca.
    - Aquellos que solo tienen métodos estáticos.
    - Aquellos que almacenan datos de manera local (ej. un contador).
    - Aquellos que solo funcionan en bases de datos.
  correct:
    - 2
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: Se dice que un componente tiene estado cuando es capaz de recordar información entre diferentes llamadas o interacciones durante su ejecución en el sistema [66, 67].
- id: q54
  asignatura: dar
  type: single
  question: ¿Qué lenguaje permite la creación clara de componentes?
  options:
    - Java y Ada95.
    - HTML y CSS.
    - SQL y XML.
    - Python y Bash.
  correct:
    - 0
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: Java (con sus Beans) y Ada95 son ejemplos académicos clásicos de lenguajes diseñados con características que facilitan la encapsulación y creación de componentes modulares [67, 68].
- id: q55
  asignatura: dar
  type: single
  question: "Un contrato de uso establece:"
  options:
    - La funcionalidad a través de su interfaz.
    - La estética visual del componente.
    - La velocidad de descarga de la web.
    - El tipo de navegador obligatorio.
  correct:
    - 0
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: El contrato de uso es el acuerdo técnico que asegura que el componente cumplirá con las funciones descritas en su interfaz si se utiliza correctamente [68, 69].
- id: q56
  asignatura: dar
  type: single
  question: "La POC utiliza principalmente:"
  options:
    - La herencia en lugar de la composición.
    - La recursividad como base del diseño.
    - La composición en lugar de la herencia.
    - El acoplamiento fuerte como objetivo.
  correct:
    - 2
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: A diferencia de la POO tradicional que abusa de la jerarquía (herencia), la POC prefiere construir sistemas complejos uniendo piezas independientes (composición) [68, 70].
- id: q57
  asignatura: dar
  type: single
  question: "Los componentes pueden ejecutarse de forma:"
  options:
    - Solo local.
    - Local o distribuida.
    - Solo en cliente.
    - Solo en servidor.
  correct:
    - 1
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: Dada su naturaleza independiente y modular, un componente puede funcionar dentro del mismo programa o estar alojado en una red para ser consultado remotamente [70, 71].
- id: q58
  asignatura: dar
  type: single
  question: ¿Es necesaria la fase de instalación de un componente?
  options:
    - No, los componentes no requieren registro.
    - Solo si el componente usa CSS3.
    - Sí, para registrarlo en el sistema y que las aplicaciones lo usen.
    - Solo en aplicaciones móviles.
  correct:
    - 2
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: La instalación es el paso donde el componente se integra físicamente en el entorno de ejecución, permitiendo que otras partes del software lo reconozcan y utilicen [71, 72].
- id: q59
  asignatura: dar
  type: single
  question: "La fase de especificación debe ser:"
  options:
    - Independiente de la plataforma de desarrollo.
    - Dependiente del lenguaje de programación del cliente.
    - Exclusiva para Windows.
    - Obligatoria en HTML.
  correct:
    - 0
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: Para que un componente sea verdaderamente universal, su definición abstracta (qué hace) debe realizarse sin atarse a un lenguaje o sistema operativo específico [71, 73].
- id: q60
  asignatura: dar
  type: single
  question: "Bajo acoplamiento en componentes implica:"
  options:
    - Mayor dependencia y menos flexibilidad.
    - Menor dependencia entre módulos.
    - Herencia obligatoria entre módulos.
    - Uso exclusivo de variables globales.
  correct:
    - 1
  tema: "Tema 4: Concepto de la programación orientada a componentes"
  explicacion: El bajo acoplamiento busca que los cambios realizados dentro de un componente no afecten a los demás, permitiendo que el sistema sea más flexible y fácil de arreglar [74, 75].
- id: q61
  asignatura: dar
  type: single
  question: "La arquitectura de componentes busca:"
  options:
    - Evitar cualquier reutilización de código.
    - Sustituir el ciclo de vida del software por prototipos.
    - Desarrollos más robustos, homogéneos y escalables.
    - Obligar a usar un único lenguaje de programación.
  correct:
    - 2
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: Al basarse en piezas ya probadas y estándares, la arquitectura de componentes asegura que el software resultante sea de mayor calidad y fácil de ampliar [7, 74].
- id: q62
  asignatura: dar
  type: single
  question: "CORBA se centra en:"
  options:
    - Facilitar el uso de componentes remotos mediante POO.
    - Sustituir HTTP por SMTP.
    - Eliminar el uso de middleware en redes.
    - Crear únicamente páginas estáticas HTML.
  correct:
    - 0
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: CORBA es un estándar diseñado para permitir que objetos escritos en diferentes lenguajes puedan comunicarse a través de una red de forma transparente [76, 77].
- id: q63
  asignatura: dar
  type: single
  question: "DCOM permite:"
  options:
    - Ejecutar CSS en el servidor.
    - Diseñar interfaces gráficas con HTML5.
    - Desarrollar componentes distribuidos.
    - Sustituir Java por JavaScript.
  correct:
    - 2
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: DCOM (Distributed Component Object Model) es la tecnología de Microsoft que permite que los componentes se comuniquen entre sí aunque estén en diferentes ordenadores [76, 77].
- id: q64
  asignatura: dar
  type: single
  question: "Enterprise JavaBeans (EJB) utiliza un modelo:"
  options:
    - Peer-to-peer.
    - Monolítico sin capas.
    - Cliente-Servidor.
    - Exclusivo de escritorio.
  correct:
    - 2
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: Los EJB forman parte del estándar J2EE para aplicaciones empresariales distribuidas, operando típicamente bajo la arquitectura de cliente que solicita servicios al servidor [77, 78].
- id: q65
  asignatura: dar
  type: single
  question: "Composición simple en POC ocurre cuando:"
  options:
    - Solo se usan componentes propios sin frameworks.
    - Se combinan componentes de un framework con otros.
    - Se elimina toda dependencia y no hay interfaces.
    - Los componentes se copian dentro del mismo archivo.
  correct:
    - 1
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: Se habla de composición simple cuando aprovechamos las herramientas de integración que ofrece un framework para unir diferentes componentes entre sí [79, 80].
- id: q66
  asignatura: dar
  type: single
  question: "La arquitectura software detalla estructuras con un:"
  options:
    - Alto nivel de abstracción.
    - Bajo nivel de ensamblador.
    - Nivel de microcódigo.
    - Nivel de hardware físico.
  correct:
    - 0
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: La arquitectura no se pierde en los detalles técnicos de cada línea de código, sino que define el esquema global, las conexiones y el comportamiento del sistema a gran escala [76, 80].
- id: q67
  asignatura: dar
  type: single
  question: ¿Qué tecnología busca transparencia para el desarrollador?
  options:
    - CORBA.
    - .NET.
    - HTML5.
    - CSS3.
  correct:
    - 1
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: La plataforma .NET de Microsoft fue diseñada para que el programador pueda centrarse en la lógica del negocio mientras que el framework se encarga de la interoperabilidad y gestión de recursos [76, 81].
- id: q68
  asignatura: dar
  type: single
  question: "La composición heterogénea implica:"
  options:
    - Componer solo dentro del mismo lenguaje.
    - Eliminar frameworks y usar solo componentes puros.
    - Componer componentes a través de diferentes frameworks.
    - Ejecutar componentes solo localmente.
  correct:
    - 2
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: Este tipo de composición compleja se da cuando un sistema requiere integrar piezas que provienen de distintos entornos de trabajo o tecnologías [81, 82].
- id: q69
  asignatura: dar
  type: single
  question: ¿Es posible tratar a un framework como un componente?
  options:
    - No, un framework nunca puede encapsularse.
    - Solo si se reescribe en ensamblador.
    - Sí, mediante la extensión del framework.
    - Solo en arquitecturas monolíticas.
  correct:
    - 2
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: Un framework avanzado puede ser encapsulado y tratado como un componente de mayor tamaño para ser integrado dentro de otras arquitecturas más amplias [81, 83].
- id: q70
  asignatura: dar
  type: single
  question: "Composición transitiva es:"
  options:
    - La composición que se hace en un único paso y termina ahí.
    - El resultado de una composición previa que se vuelve a combinar.
    - La composición exclusiva de componentes gráficos.
    - La eliminación de interfaces para simplificar.
  correct:
    - 1
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: En sistemas complejos, el producto de unir dos componentes puede ser utilizado como una pieza única para formar una composición aún mayor, siguiendo una cadena de integración [83, 84].
- id: q71
  asignatura: dar
  type: single
  question: "Para lograr reutilización es necesario crear:"
  options:
    - Repositorios de imágenes.
    - Repositorios de componentes.
    - Repositorios de usuarios.
    - Repositorios de conexiones HTTP.
  correct:
    - 1
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: Para que la industria del software sea eficiente, los componentes validados deben almacenarse en repositorios accesibles para que otros desarrolladores puedan localizarlos y usarlos [84, 85].
- id: q72
  asignatura: dar
  type: single
  question: "La arquitectura basada en componentes enfatiza:"
  options:
    - La herencia y el acoplamiento fuerte.
    - La descomposición en componentes funcionales con interfaces definidas.
    - El uso exclusivo de variables globales.
    - La ausencia total de contratos.
  correct:
    - 1
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: El pilar de esta arquitectura es dividir el problema en partes manejables que hablen entre sí únicamente a través de puntos de conexión estandarizados e interfaces [58, 86].
- id: q73
  asignatura: dar
  type: single
  question: ¿Qué aporta la arquitectura de componentes al ciclo industrial?
  options:
    - Mayor eficiencia.
    - Mayor dependencia entre módulos.
    - Menor reutilización.
    - Sustitución de pruebas por despliegue directo.
  correct:
    - 0
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: Al industrializar el desarrollo y evitar 'reinventar la rueda', las empresas pueden entregar software de calidad en menos tiempo y con menos errores [86, 87].
- id: q74
  asignatura: dar
  type: single
  question: "La arquitectura ayuda a prever:"
  options:
    - El color final del diseño.
    - Cambios en el software.
    - La marca del navegador del usuario.
    - El tipo de teclado del programador.
  correct:
    - 1
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: Un sistema bien arquitecturado permite anticipar cómo afectarán las futuras modificaciones y asegura que el software pueda evolucionar sin colapsar [79, 88].
- id: q75
  asignatura: dar
  type: single
  question: ¿Los componentes deben ser dependientes entre sí?
  options:
    - Sí, porque mejora el control.
    - Sí, porque evita interfaces.
    - No, la fuerza de la arquitectura reside en su independencia e interfaz.
    - Solo en sistemas distribuidos.
  correct:
    - 2
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: "La meta es la independencia absoluta: un componente debe poder ser extraído de un sistema y puesto en otro totalmente distinto siempre que se respete su interfaz [88, 89]."
- id: q76
  asignatura: dar
  type: single
  question: "Bootstrap garantiza:"
  options:
    - Un diseño adaptativo y principios de accesibilidad.
    - La ejecución de Java en el navegador sin servidor.
    - La compilación automática de CSS a HTML.
    - La eliminación de JavaScript en interfaces web.
  correct:
    - 0
  tema: "Tema 6: Bootstrap"
  explicacion: Bootstrap está diseñado para que la web se adapte a cualquier tamaño de pantalla (responsive) y para que sea usable por personas con discapacidades mediante estándares de accesibilidad [90, 91].
- id: q77
  asignatura: dar
  type: single
  question: "Requisitos para ejecutar Bootstrap 3:"
  options:
    - Solo HTML y CSS.
    - CSS, JS, HTML5 y JQuery.
    - PHP, MySQL y Apache.
    - XML, XSLT y XPath.
  correct:
    - 1
  tema: "Tema 6: Bootstrap"
  explicacion: La versión 3 de Bootstrap depende internamente de la librería JQuery para sus componentes interactivos (modales, menús, etc.) y requiere los estándares modernos de HTML5 y CSS3 [57, 91].
- id: q78
  asignatura: dar
  type: single
  question: "El diseño con rejilla de Bootstrap:"
  options:
    - Obliga a usar tablas HTML para maquetar.
    - Elimina el uso de contenedores en la web.
    - Sustituye CSS por JavaScript para el layout.
    - Crea una estructura ordenada y proporciona continuidad.
  correct:
    - 3
  tema: "Tema 6: Bootstrap"
  explicacion: El sistema de rejilla (grid) permite organizar el contenido en columnas y filas, lo que otorga un aspecto profesional, limpio y equilibrado a la página [91, 92].
- id: q79
  asignatura: dar
  type: single
  question: "Etiqueta necesaria para el diseño adaptativo en móviles:"
  options:
    - <meta name='mobile' content='true'>
    - <meta charset='UTF-8'>
    - <meta name='viewport' content='width=device-width, initial-scale=1'>
    - <meta http-equiv='refresh' content='30'>
  correct:
    - 2
  tema: "Tema 6: Bootstrap"
  explicacion: Esta etiqueta indica al navegador que el ancho de la página debe ser igual al ancho de la pantalla del dispositivo, evitando que la web se vea minúscula en los móviles [93, 94].
- id: q80
  asignatura: dar
  type: single
  question: "Tipos de rejillas según dispositivo:"
  options:
    - tv, console, pc, mobile.
    - xs (móviles), sm (tablets), md (PC), lg (PC gran pantalla).
    - small, medium, large, xlarge.
    - 1col, 2col, 3col, 4col.
  correct:
    - 1
  tema: "Tema 6: Bootstrap"
  explicacion: Bootstrap utiliza estos prefijos de clase para que el desarrollador pueda definir un comportamiento distinto del diseño según el tamaño de la pantalla [93, 95].
- id: q81
  asignatura: dar
  type: single
  question: "Clase para centrar la web automáticamente:"
  options:
    - row-center
    - container
    - align-web
    - center-blocks
  correct:
    - 1
  tema: "Tema 6: Bootstrap"
  explicacion: La clase '.container' es el elemento raíz de la estructura de Bootstrap; centra el contenido y le otorga un ancho máximo adecuado para cada tipo de monitor [96, 97].
- id: q82
  asignatura: dar
  type: single
  question: "Bootstrap es un framework orientado a:"
  options:
    - Enmaquetado HTML y diseño CSS.
    - Bases de datos distribuidas.
    - Control de procesos del sistema operativo.
    - Compilación de Java en servidor.
  correct:
    - 0
  tema: "Tema 6: Bootstrap"
  explicacion: A diferencia de los frameworks de back-end, Bootstrap se enfoca exclusivamente en la capa visual y estructural de la aplicación web (front-end) [97, 98].
- id: q83
  asignatura: dar
  type: single
  question: "Atributo box-shadow en Bootstrap:"
  options:
    - Añade efectos visuales según el estado de un campo.
    - Cambia el método HTTP de un formulario.
    - Define el tamaño de la rejilla responsive.
    - Crea enlaces de navegación semánticos.
  correct:
    - 0
  tema: "Tema 6: Bootstrap"
  explicacion: Bootstrap utiliza sombras para resaltar campos de formulario cuando estos obtienen el foco o contienen errores, mejorando la respuesta visual al usuario [97, 99].
- id: q84
  asignatura: dar
  type: single
  question: "Para formularios que ocupen poco espacio se usa la clase:"
  options:
    - form-compact
    - form-inline
    - form-small
    - form-grid
  correct:
    - 1
  tema: "Tema 6: Bootstrap"
  explicacion: La clase '.form-inline' coloca todos los elementos del formulario en una sola línea horizontal, ideal para barras de búsqueda o logins sencillos [100, 101].
- id: q85
  asignatura: dar
  type: single
  question: ¿Cómo se desactiva el diseño adaptativo?
  options:
    - Eliminando los archivos CSS.
    - Desactivando JavaScript del navegador.
    - Eliminando la etiqueta viewport y el max-width de contenedores.
    - Cambiando <div> por <span>.
  correct:
    - 2
  tema: "Tema 6: Bootstrap"
  explicacion: Si se desea una web con ancho fijo que no cambie en móviles, se deben quitar las instrucciones que fuerzan al navegador a adaptar la escala y el tamaño del contenedor [101, 102].
- id: q86
  asignatura: dar
  type: single
  question: "Bootstrap distingue tres estados en formularios:"
  options:
    - error-only, success-only, warning-only.
    - has-error, has-success y has-warning.
    - form-red, form-green, form-yellow.
    - state-0, state-1, state-2.
  correct:
    - 1
  tema: "Tema 6: Bootstrap"
  explicacion: Estas clases permiten aplicar colores automáticos (rojo, verde y amarillo) a los campos de texto para informar al usuario sobre la validez de sus datos [101, 103].
- id: q87
  asignatura: dar
  type: single
  question: "La clase sr-only sirve para:"
  options:
    - Aumentar el tamaño del texto en móviles.
    - Ocultar elementos para mejorar rendimiento.
    - Accesibilidad, ocultando etiquetas visualmente pero no para lectores.
    - Crear sombras en texto automáticamente.
  correct:
    - 2
  tema: "Tema 6: Bootstrap"
  explicacion: Es vital para el cumplimiento de las normas de accesibilidad (Screen Reader Only); permite que los invidentes escuchen la etiqueta del campo aunque esta no se vea en pantalla [100, 104].
- id: q88
  asignatura: dar
  type: single
  question: ¿Bootstrap incluye iconos?
  options:
    - No, requiere librerías externas obligatorias.
    - Sí, pero solo si se usa React.
    - Sí, tiene un amplio número de componentes CSS disponibles.
    - Solo soporta iconos SVG personalizados.
  correct:
    - 2
  tema: "Tema 6: Bootstrap"
  explicacion: Bootstrap viene por defecto con una librería de iconos (Glyphicons) que pueden insertarse fácilmente en botones, menús y alertas mediante clases de CSS [104, 105].
- id: q89
  asignatura: dar
  type: single
  question: "La rejilla de Bootstrap divide la página en:"
  options:
    - Filas sin columnas.
    - Columnas sin filas.
    - Campos e interludios dentro de márgenes.
    - Un único contenedor fijo sin divisiones.
  correct:
    - 2
  tema: "Tema 6: Bootstrap"
  explicacion: Técnicamente, la rejilla o retícula divide el espacio de trabajo en 12 columnas imaginarias que permiten colocar los elementos con precisión matemática [92, 106].
- id: q90
  asignatura: dar
  type: single
  question: "Bootstrap es capaz de lograr diseño adaptativo en:"
  options:
    - Solo móviles.
    - Solo PC.
    - Solo tablets.
    - PC, Tablet y Smartphones.
  correct:
    - 3
  tema: "Tema 6: Bootstrap"
  explicacion: La universalidad de Bootstrap radica en que una sola base de código sirve para visualizar correctamente la aplicación en cualquier tipo de terminal inteligente [8, 106].
- id: q91
  asignatura: dar
  type: single
  question: "En MVC, la M significa:"
  options:
    - "Módulo: controla la navegación de la web."
    - "Monitor: supervisa las peticiones HTTP."
    - "Modelo: Maneja datos y lógica de negocios."
    - "Motor: renderiza la interfaz de usuario."
  correct:
    - 2
  tema: "Tema 7: Modelo vista controlador"
  explicacion: El Modelo es la capa que se comunica con la base de datos y contiene todas las reglas de negocio de la aplicación [90, 106].
- id: q92
  asignatura: dar
  type: single
  question: "En MVC, la V significa:"
  options:
    - "Vista: Se encarga del diseño y presentación."
    - "Validación: comprueba reglas de negocio."
    - "Versión: gestiona cambios del código."
    - "Variable: contiene datos temporales."
  correct:
    - 0
  tema: "Tema 7: Modelo vista controlador"
  explicacion: La Vista es la capa de interfaz de usuario; su única responsabilidad es mostrar la información procesada al consumidor final [60, 107].
- id: q93
  asignatura: dar
  type: single
  question: "En MVC, la C significa:"
  options:
    - "Cliente: ejecuta la aplicación."
    - "Conector: une capas de persistencia."
    - "Controlador: Enruta comandos a modelos y vistas."
    - "Compilador: transforma el código a binario."
  correct:
    - 2
  tema: "Tema 7: Modelo vista controlador"
  explicacion: El Controlador actúa como cerebro o enlace, tomando las acciones del usuario y decidiendo qué datos del Modelo debe mostrar en qué Vista [107, 108].
- id: q94
  asignatura: dar
  type: single
  question: "El controlador en MVC actúa como:"
  options:
    - Enlace entre el modelo y la vista ante eventos de usuario.
    - Motor de base de datos relacional.
    - Sustituto de la vista para mostrar HTML.
    - Sistema de archivos para recursos estáticos.
  correct:
    - 0
  tema: "Tema 7: Modelo vista controlador"
  explicacion: "Su función principal es la mediación: recibe peticiones del usuario, interactúa con el modelo y selecciona la vista apropiada para la respuesta [109, 110]."
- id: q95
  asignatura: dar
  type: single
  question: "En la implementación Java de MVC, el Servlet suele ser:"
  options:
    - La Vista.
    - El Controlador.
    - El Modelo.
    - El navegador del cliente.
  correct:
    - 1
  tema: "Tema 7: Modelo vista controlador"
  explicacion: Dentro de la arquitectura web de Java, los servlets procesan las peticiones HTTP iniciales, funcionando perfectamente como la pieza controladora del patrón [110, 111].
- id: q96
  asignatura: dar
  type: single
  question: "En la implementación Java de MVC, el JSP suele ser:"
  options:
    - La Vista.
    - El Controlador.
    - El Modelo.
    - El servidor de aplicaciones.
  correct:
    - 0
  tema: "Tema 7: Modelo vista controlador"
  explicacion: JavaServer Pages (JSP) se utiliza para generar contenido HTML de forma dinámica en el servidor, asumiendo el rol de representación visual para el usuario [110, 112].
- id: q97
  asignatura: dar
  type: single
  question: "En la implementación Java de MVC, el JavaBean o EJB es:"
  options:
    - El Controlador (recibe eventos).
    - La Vista (renderiza HTML).
    - El Modelo (comunica con BD).
    - El Router (gestiona red).
  correct:
    - 2
  tema: "Tema 7: Modelo vista controlador"
  explicacion: Los JavaBeans y EJB (Enterprise JavaBeans) encapsulan los datos y las operaciones de acceso a bases de datos, cumpliendo con la definición de la capa de Modelo [113, 114].
- id: q98
  asignatura: dar
  type: single
  question: "WSDM es un método de desarrollo web centrado en:"
  options:
    - La base de datos más que el usuario.
    - El usuario más que en los datos.
    - La compilación y despliegue automático.
    - El diseño gráfico exclusivamente.
  correct:
    - 1
  tema: "Tema 7: Modelo vista controlador"
  explicacion: Web Site Design Method (WSDM) es una metodología que prioriza los requisitos y perfiles de los usuarios finales para guiar todo el proceso de diseño del sitio [9, 114].
- id: q99
  asignatura: dar
  type: single
  question: "Metodología UWE se fundamenta en:"
  options:
    - Un metamodelo basado en XML.
    - Un metamodelo basado en UML.
    - Un metamodelo basado en HTML5.
    - Un metamodelo basado en CSS3.
  correct:
    - 1
  tema: "Tema 7: Modelo vista controlador"
  explicacion: UWE (UML-based Web Engineering) utiliza el estándar de modelado UML para definir por separado los aspectos de contenido, navegación y presentación de una web [109, 114].
- id: q100
  asignatura: dar
  type: single
  question: "WebML se caracteriza por:"
  options:
    - Bajo nivel de abstracción y foco técnico inicial.
    - Un alto nivel de abstracción sin considerar detalles técnicos iniciales.
    - Exclusividad para aplicaciones móviles.
    - Sustituir patrones de diseño por scripts.
  correct:
    - 1
  tema: "Tema 7: Modelo vista controlador"
  explicacion: WebML permite construir sitios web complejos mediante modelos visuales, abstrayendo al desarrollador de la codificación técnica en las fases iniciales del diseño [9, 115].
- id: q101
  asignatura: dar
  type: single
  question: "Framework para la capa de Modelo en Java:"
  options:
    - Bootstrap.
    - Node.js.
    - JPA o Hibernate.
    - JQuery.
  correct:
    - 2
  tema: "Tema 7: Modelo vista controlador"
  explicacion: Estas herramientas facilitan el mapeo de objetos Java a tablas de bases de datos relacionales, siendo el estándar de la industria para la capa de persistencia [115, 116].
- id: q102
  asignatura: dar
  type: single
  question: "Framework para la capa de Vista en Java:"
  options:
    - JSF (Java Servlet Faces).
    - JPA.
    - Hibernate.
    - Apache Axis.
  correct:
    - 0
  tema: "Tema 7: Modelo vista controlador"
  explicacion: JavaServer Faces (JSF) es un framework centrado en componentes para construir interfaces de usuario de aplicaciones web basadas en Java [115, 116].
- id: q103
  asignatura: dar
  type: single
  question: "Un patrón de diseño es:"
  options:
    - Un lenguaje de programación para web.
    - Una solución general y reutilizable a problemas comunes.
    - Un protocolo de transporte de datos.
    - Un estándar de marcado derivado de SGML.
  correct:
    - 1
  tema: "Tema 7: Modelo vista controlador"
  explicacion: En ingeniería de software, los patrones son 'recetas' o arquitecturas ya probadas por la comunidad que resuelven retos típicos de diseño de forma eficiente [117, 118].
- id: q104
  asignatura: dar
  type: single
  question: "Tipos de patrones de diseño:"
  options:
    - Estáticos, dinámicos y persistentes.
    - Creacionales, estructurales y de comportamiento.
    - Cliente, servidor y distribuido.
    - HTML, CSS y JavaScript.
  correct:
    - 1
  tema: "Tema 7: Modelo vista controlador"
  explicacion: "Esta es la clasificación estándar de la ingeniería de software: patrones para crear objetos, para organizar estructuras y para definir la interacción entre ellos [118, 119]."
- id: q105
  asignatura: dar
  type: single
  question: ¿MVC permite la separación de lógica de negocio y visualización?
  options:
    - No, mezcla ambas capas para simplificar.
    - Solo en aplicaciones sin base de datos.
    - Sí, es su objetivo fundamental.
    - Solo si se usa AJAX.
  correct:
    - 2
  tema: "Tema 7: Modelo vista controlador"
  explicacion: Al separar la Vista (visualización) del Modelo (lógica), se permite que diseñadores y programadores trabajen de forma independiente y que el sistema sea más fácil de mantener [120, 121].
- id: q106
  asignatura: dar
  type: single
  question: "Con la creación de clusters se consigue:"
  options:
    - Eliminar completamente la necesidad de redes.
    - Ejecutar únicamente tareas de usuario individuales.
    - Reemplazar HTTP por FTP en sistemas distribuidos.
    - Compartir recursos (carga o computación) entre nodos.
  correct:
    - 3
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: Un cluster consiste en un grupo de ordenadores conectados en una red local que actúan como si fueran una sola máquina potente para resolver tareas compartidas [121, 122].
- id: q107
  asignatura: dar
  type: single
  question: "Las aplicaciones distribuidas de alto rendimiento (HPC):"
  options:
    - Requieren gran capacidad de cómputo, superior a un único superordenador.
    - Solo ejecutan tareas ofimáticas de bajo consumo.
    - Se limitan a sistemas monousuario.
    - Funcionan siempre sin paralelismo.
  correct:
    - 0
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: Las aplicaciones HPC (High Performance Computing) necesitan tal nivel de procesamiento que solo pueden ejecutarse mediante el trabajo paralelo de múltiples nodos en un cluster o grid [122, 123].
- id: q108
  asignatura: dar
  type: single
  question: "La Tecnología Grid está diseñada para:"
  options:
    - Resolver problemas demasiado grandes para un superordenador.
    - Ejecutar solo páginas HTML estáticas.
    - Eliminar el uso de middleware distribuido.
    - Sustituir los clusters locales por un único PC.
  correct:
    - 0
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: El Grid es una infraestructura que permite la coordinación de recursos de computación geográficamente dispersos para afrontar problemas científicos o industriales masivos [45, 123].
- id: q109
  asignatura: dar
  type: single
  question: "Tres puntos fundamentales para considerar un sistema como Grid:"
  options:
    - Coordinación de recursos, protocolos estándar y QoS.
    - Uso exclusivo de JavaScript, HTML5 y CSS3.
    - Monolitismo, acoplamiento fuerte y baja latencia.
    - Seguridad nula, ejecución local y sin estándares.
  correct:
    - 0
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: Para que un sistema sea Grid debe haber una gestión centralizada de recursos heterogéneos, usar interfaces abiertas para la interoperabilidad y garantizar una calidad de servicio [124, 125].
- id: q110
  asignatura: dar
  type: single
  question: "La tecnología Grid ha de ser:"
  options:
    - Dependiente de un único proveedor y plataforma.
    - Local, monolítica y rígida.
    - Exclusiva para superordenadores idénticos.
    - Dependiente, Consistente, Penetrante y Económica.
  correct:
    - 3
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: El manual oficial define que el Grid debe ser estable (Dependiente), basado en estándares (Consistente), comunicativo (Penetrante) y rentable (Económico) [10, 125].
- id: q111
  asignatura: dar
  type: single
  question: "Diferencia entre Cluster y Grid:"
  options:
    - Un grid siempre es local y un cluster siempre remoto.
    - Los clusters suelen ser locales, el Grid une clusters dispersos geográficamente.
    - Un cluster usa HTTP y un grid usa FTP.
    - "No existe diferencia: son sinónimos."
  correct:
    - 1
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: Mientras que un cluster es una agrupación de proximidad física, el Grid es una 'malla' que conecta diversos centros de datos o clusters a través de grandes distancias [10, 126].
- id: q112
  asignatura: dar
  type: single
  question: "Aplicaciones HTC (Alta Productividad) se encargan de:"
  options:
    - Renderizado gráfico en tiempo real exclusivamente.
    - Tareas secuenciales que pueden dividirse y componerse.
    - Solo tareas interactivas de baja duración.
    - Tareas que requieren GPU obligatoria.
  correct:
    - 1
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: HTC (High Throughput Computing) se centra en procesar una gran cantidad de tareas pequeñas o divisibles que requieren mucha potencia de cálculo durante periodos largos de tiempo [10, 126].
- id: q113
  asignatura: dar
  type: single
  question: "La e-Ciencia es:"
  options:
    - Cuando la ciencia depende de la computación (meteorología, bioinformática).
    - La ciencia realizada sin herramientas digitales.
    - Un tipo de diseño web orientado a datos.
    - Un estándar de comunicación HTTP.
  correct:
    - 0
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: El término e-Ciencia se refiere a la investigación científica que utiliza recursos computacionales avanzados para analizar grandes volúmenes de datos distribuidos [127, 128].
- id: q114
  asignatura: dar
  type: single
  question: ¿Qué es la Meta-computación?
  options:
    - Un único superordenador con más memoria.
    - La unión de varios superordenadores.
    - Un navegador especializado en HPC.
    - Un protocolo de cifrado de red.
  correct:
    - 1
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: Fue el concepto precursor del Grid; consistía en interconectar varios superordenadores distantes para que funcionaran de forma coordinada como una única entidad lógica [127, 128].
- id: q115
  asignatura: dar
  type: single
  question: "Ventaja de los clusters:"
  options:
    - Menor fiabilidad por depender de múltiples nodos.
    - Obligan a usar nodos idénticos siempre.
    - No permiten paralelización.
    - Disminución de la obsolescencia y mayor fiabilidad (tolerancia a fallos).
  correct:
    - 3
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: Al usar múltiples máquinas estándar, si una falla, las demás continúan el trabajo. Además, permite actualizar el hardware de forma modular y económica [129, 130].
- id: q116
  asignatura: dar
  type: single
  question: "El software de control en Grid sirve para:"
  options:
    - Cambiar el HTML de las páginas servidas.
    - Monitorizar y controlar los recursos globalmente.
    - Compilar programas en lenguaje ensamblador.
    - Sustituir la red por ejecución local.
  correct:
    - 1
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: Un sistema Grid necesita una capa de software (middleware) que se encargue de saber qué nodos están libres, repartir las tareas y vigilar la seguridad de la red [10, 129].
- id: q117
  asignatura: dar
  type: single
  question: "El criterio económico en Grid implica:"
  options:
    - Ser más caro que usar un superordenador dedicado.
    - Ser más rentable que el uso de mainframes.
    - Evitar cualquier reutilización de recursos.
    - Obligar a adquirir hardware propietario.
  correct:
    - 1
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: La implantación de un Grid solo tiene sentido si ofrece una capacidad de cálculo similar a la de un superordenador mainframe pero a un coste significativamente inferior [131, 132].
- id: q118
  asignatura: dar
  type: single
  question: "QoS en Grid mide:"
  options:
    - Tiempo de respuesta, rendimiento y seguridad.
    - Solo el ancho de banda de red.
    - Únicamente el número de usuarios conectados.
    - El tamaño de archivos HTML.
  correct:
    - 0
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: Quality of Service (QoS) asegura que el sistema Grid cumpla con niveles mínimos de estabilidad y rapidez necesarios para que las aplicaciones HPC funcionen [131, 132].
- id: q119
  asignatura: dar
  type: single
  question: ¿Los nodos en un Grid deben ser idénticos?
  options:
    - Sí, es obligatorio que sean iguales.
    - Sí, para asegurar compatibilidad de hardware.
    - No, se usan elementos heterogéneos.
    - Solo si el Grid usa HTTP.
  correct:
    - 2
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: Una de las fortalezas del Grid es su capacidad para integrar máquinas con distintos sistemas operativos y hardware (heterogeneidad) mediante protocolos comunes [10, 133].
- id: q120
  asignatura: dar
  type: single
  question: "La tecnología Grid se enmarca en el paradigma de:"
  options:
    - Programación local monousuario.
    - Computación distribuida.
    - Computación sin red.
    - Compilación estática.
  correct:
    - 1
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: La computación distribuida es el modelo donde los recursos de diferentes equipos se unen para trabajar en un objetivo común, siendo el Grid su máxima expresión [130, 133].
- id: q121
  asignatura: dar
  type: single
  question: "SOAP es la tecnología utilizada para:"
  options:
    - Invocar servicios descubiertos y comunicar consumidor con proveedor.
    - Diseñar interfaces web responsive.
    - Reemplazar HTTP por FTP en servicios.
    - Sustituir XML por CSS3.
  correct:
    - 0
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: SOAP (Simple Object Access Protocol) es el protocolo de mensajería basado en XML que permite la comunicación estandarizada entre el cliente y el servicio web [133, 134].
- id: q122
  asignatura: dar
  type: single
  question: ¿Qué es un Web Service?
  options:
    - Un archivo HTML con estilos embebidos.
    - Un componente que solo funciona en local.
    - Una tecnología que habilita la comunicación entre computadoras mediante protocolos y estándares.
    - Un estándar de diseño gráfico para web.
  correct:
    - 2
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: Los servicios web son aplicaciones modulares que pueden ser localizadas e invocadas a través de la red para realizar tareas específicas de forma distribuida [135, 136].
- id: q123
  asignatura: dar
  type: single
  question: "Apache Axis está formado por:"
  options:
    - La aplicación AXIS y el servidor Apache.
    - Un navegador y un motor CSS.
    - Un compilador JavaScript y un router.
    - Un framework de Bootstrap y un plugin JQuery.
  correct:
    - 0
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: Apache Axis es un framework de código abierto para la construcción y despliegue de servicios web utilizando el servidor web de Apache [108, 135].
- id: q124
  asignatura: dar
  type: single
  question: "Un Web Service puede utilizar protocolos como:"
  options:
    - TCP únicamente.
    - SMTP exclusivamente.
    - XML-RPC, SOAP o REST.
    - FTP para todos los casos.
  correct:
    - 2
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: Dependiendo de la arquitectura seleccionada, los servicios web pueden emplear diferentes protocolos de mensajería y transferencia sobre HTTP [137, 138].
- id: q125
  asignatura: dar
  type: single
  question: "WSDL sirve para:"
  options:
    - Describir las interfaces de los servicios web.
    - Ejecutar JavaScript en el servidor.
    - Definir estilos de presentación CSS.
    - Realizar consultas SQL en remoto.
  correct:
    - 0
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: WSDL (Web Services Description Language) es un archivo XML que informa al consumidor sobre qué funciones tiene el servicio y qué parámetros debe enviar [137, 139].
- id: q126
  asignatura: dar
  type: single
  question: "Elementos de la arquitectura SOA:"
  options:
    - Cliente, Servidor, Navegador, HTML.
    - Proveedor, Consumidor, Registro y el Servicio.
    - Modelo, Vista, Controlador y Servlet.
    - DNS, TCP, UDP y HTTP.
  correct:
    - 1
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: La arquitectura SOA (Service Oriented Architecture) requiere piezas que ofrecen servicios, piezas que los consumen y un registro central para localizarlos [137, 139].
- id: q127
  asignatura: dar
  type: single
  question: "SOA permite el desarrollo de aplicaciones:"
  options:
    - Monolíticas y fuertemente acopladas.
    - Débilmente acopladas y distribuidas.
    - Sin interfaces y sin contratos.
    - Exclusivas para escritorio.
  correct:
    - 1
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: El objetivo de SOA es que las aplicaciones se construyan uniendo servicios independientes que no dependan internamente unos de otros (débil acoplamiento) [140, 141].
- id: q128
  asignatura: dar
  type: single
  question: ¿SOA se vincula a una única tecnología?
  options:
    - Sí, solo se usa con SOAP.
    - No, puede usar RPC, CORBA o Web Services.
    - Sí, es obligatorio usar REST.
    - Sí, únicamente funciona con HTTP/3.
  correct:
    - 1
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: SOA es un estilo arquitectónico conceptual e independiente de la implementación técnica que se elija para desplegar los servicios [140, 141].
- id: q129
  asignatura: dar
  type: single
  question: "La fase de registro en SOA sirve para:"
  options:
    - Que el consumidor publique sus necesidades en un repositorio.
    - Que el proveedor especifique su interfaz y funcionalidades en un repositorio.
    - Que el servidor elimine servicios obsoletos automáticamente.
    - Que el navegador guarde cookies de sesión.
  correct:
    - 1
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: El registro (como UDDI) actúa como 'páginas amarillas' donde los proveedores anuncian sus servicios para que los consumidores puedan encontrarlos [140, 142].
- id: q130
  asignatura: dar
  type: single
  question: ¿Qué protocolo de transporte usa SOA por defecto?
  options:
    - SMTP.
    - FTP.
    - HTTP.
    - UDP.
  correct:
    - 2
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: Aunque podría usar otros, HTTP es el protocolo estándar de transporte sobre el cual viajan los mensajes SOAP y las peticiones a los servicios web en Internet [143, 144].
- id: q131
  asignatura: dar
  type: single
  question: "IBM WebSphere es:"
  options:
    - Un lenguaje de marcado derivado de SGML.
    - Un middleware para crear aplicaciones multiplataforma usando servicios web.
    - Un estándar de estilos para CSS3.
    - Un framework para diseño responsive en cliente.
  correct:
    - 1
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: WebSphere es una plataforma de software de IBM (middleware) diseñada para facilitar el despliegue de aplicaciones empresariales basadas en SOA [142, 143].
- id: q132
  asignatura: dar
  type: single
  question: "SOA busca soluciones:"
  options:
    - Independientes para cada problema mediante módulos.
    - Dependientes y fuertemente acopladas.
    - Basadas solo en HTML estático.
    - Que eliminen el registro de servicios.
  correct:
    - 0
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: La filosofía SOA promueve resolver grandes retos de negocio mediante la unión de pequeños servicios específicos y reutilizables [143, 145].
- id: q133
  asignatura: dar
  type: single
  question: "El consumidor en SOA es quien:"
  options:
    - Publica servicios en el registro.
    - Implementa el servicio web.
    - Demanda la utilización de determinados servicios.
    - Compila el WSDL a HTML.
  correct:
    - 2
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: El consumidor (o cliente) es la aplicación que localiza un servicio en el registro y envía una petición para utilizar su funcionalidad [146, 147].
- id: q134
  asignatura: dar
  type: single
  question: "Enhanced Web Services en Java incluyen:"
  options:
    - Un motor de estilos para CSS3.
    - Funcionalidades para intercambio de mensajes.
    - Un navegador integrado para pruebas.
    - Un compilador de Bootstrap.
  correct:
    - 1
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: Java incorpora extensiones específicas para mejorar la fiabilidad y seguridad en la transmisión de mensajes XML entre servicios distribuidos [144, 146].
- id: q135
  asignatura: dar
  type: single
  question: "SOA ofrece un desarrollo de aplicaciones web:"
  options:
    - Lento e inestable.
    - Solo válido para aplicaciones sin red.
    - Ágil y robusto.
    - Incompatible con sistemas distribuidos.
  correct:
    - 2
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: Al basarse en componentes ya probados y protocolos estandarizados, SOA permite construir sistemas complejos con gran rapidez y estabilidad [148, 149].
- id: q136
  asignatura: dar
  type: single
  question: "HTTP es un protocolo:"
  options:
    - Exclusivo para transferencia de archivos multimedia.
    - De capa física para transmisión eléctrica.
    - Basado en redes P2P sin servidor.
    - Basado en arquitectura cliente-servidor, para intercambio de información y carente de estado.
  correct:
    - 3
  tema: "Tema 10: Protocolo HTTP"
  explicacion: Hypertext Transfer Protocol (HTTP) es la base de la comunicación web; funciona mediante peticiones de clientes (navegadores) y respuestas de servidores [148, 150].
- id: q137
  asignatura: dar
  type: single
  question: "Diferencia principal entre HTTP y HTTPS:"
  options:
    - La seguridad.
    - La sintaxis del HTML.
    - La capacidad de ejecutar JavaScript.
    - El uso de CSS3 obligatorio.
  correct:
    - 0
  tema: "Tema 10: Protocolo HTTP"
  explicacion: HTTPS es la versión segura de HTTP; utiliza certificados y cifrado (SSL/TLS) para proteger la información transmitida [151, 152].
- id: q138
  asignatura: dar
  type: single
  question: "Un código de respuesta HTTP 404 significa:"
  options:
    - El servidor ha fallado completamente (error 5xx).
    - El recurso existe, pero requiere autenticación.
    - Se ha comunicado con el servidor, pero el recurso no existe.
    - La petición se ha procesado correctamente sin contenido.
  correct:
    - 2
  tema: "Tema 10: Protocolo HTTP"
  explicacion: El error 404 indica que la conexión con el servidor fue exitosa, pero la URL solicitada no apunta a ningún archivo o página existente [152, 153].
- id: q139
  asignatura: dar
  type: single
  question: "Diferencia entre petición GET y POST:"
  options:
    - GET solo funciona en HTTPS y POST solo en HTTP.
    - GET envía datos en la URL; POST los envía de forma 'oculta' en el cuerpo del mensaje.
    - GET siempre cifra el contenido y POST no.
    - GET se usa para subir archivos y POST para leer páginas.
  correct:
    - 1
  tema: "Tema 10: Protocolo HTTP"
  explicacion: GET es público y visible en la barra de direcciones; POST es más seguro para datos sensibles al incluirlos dentro del paquete de datos de la petición [58, 154].
- id: q140
  asignatura: dar
  type: single
  question: "Las cookies se clasifican por almacenamiento en:"
  options:
    - De sesión y persistentes.
    - Públicas y privadas.
    - Locales y remotas.
    - Temporales y cifradas únicamente.
  correct:
    - 0
  tema: "Tema 10: Protocolo HTTP"
  explicacion: Las cookies de sesión desaparecen al cerrar el navegador, mientras que las persistentes tienen una fecha de caducidad y se guardan en el disco duro [154, 155].
- id: q141
  asignatura: dar
  type: single
  question: "SSL y TLS son:"
  options:
    - Lenguajes de marcado para servicios web.
    - Métodos HTTP equivalentes a GET y POST.
    - Frameworks de Java para MVC.
    - Protocolos seguros usados por HTTPS para conexiones cliente-servidor.
  correct:
    - 3
  tema: "Tema 10: Protocolo HTTP"
  explicacion: Estos protocolos criptográficos cifran el canal de comunicación para asegurar que la privacidad y la integridad de los datos se mantengan [47, 156].
- id: q142
  asignatura: dar
  type: single
  question: "El protocolo HTTP pertenece a la capa de:"
  options:
    - Enlace de datos.
    - Aplicación.
    - Física.
    - Transporte.
  correct:
    - 1
  tema: "Tema 10: Protocolo HTTP"
  explicacion: En el modelo TCP/IP, HTTP se ubica en la capa superior (aplicación), por encima de las capas de transporte (TCP) e Internet (IP) [3, 156].
- id: q143
  asignatura: dar
  type: single
  question: "Una URL especifica:"
  options:
    - Solo la IP del servidor y nada más.
    - El método HTTP y el tamaño de respuesta.
    - Protocolo, dirección/nombre del recurso y opcionalmente puerto.
    - El tipo de cifrado de la conexión.
  correct:
    - 2
  tema: "Tema 10: Protocolo HTTP"
  explicacion: La Uniform Resource Locator (URL) es la dirección completa que le dice al navegador exactamente dónde encontrar un recurso en la red [156, 157].
- id: q144
  asignatura: dar
  type: single
  question: "URI puede entenderse como:"
  options:
    - Un localizador.
    - Un cifrado de red.
    - Un tipo de cookie persistente.
    - Un puerto TCP fijo.
  correct:
    - 0
  tema: "Tema 10: Protocolo HTTP"
  explicacion: Un Uniform Resource Identifier (URI) es el concepto genérico de identificador para recursos en la red, siendo la URL su forma más común de localización [108, 158].
- id: q145
  asignatura: dar
  type: single
  question: "URN permite:"
  options:
    - Indicar el protocolo y puerto obligatorios.
    - Identificar recursos en la red pero no indica cómo acceder a ellos.
    - Sustituir completamente a las URLs en navegadores.
    - Transferir datos cifrados en HTTP.
  correct:
    - 1
  tema: "Tema 10: Protocolo HTTP"
  explicacion: A diferencia de la URL, el URN (Uniform Resource Name) identifica un recurso de forma persistente e independiente de su ubicación física [158, 159].
- id: q146
  asignatura: dar
  type: single
  question: "Las conexiones persistentes sirven para:"
  options:
    - Aumentar el número de errores 404.
    - Obligar a cerrar TCP tras cada petición.
    - Reducir el tráfico de peticiones usando una misma conexión TCP.
    - Sustituir GET por POST automáticamente.
  correct:
    - 2
  tema: "Tema 10: Protocolo HTTP"
  explicacion: Permiten que varias peticiones y respuestas viajen por el mismo canal, evitando el coste de tiempo de abrir y cerrar la conexión para cada imagen o script [158, 160].
- id: q147
  asignatura: dar
  type: single
  question: ¿Qué protocolo es más inapropiado para información sensible?
  options:
    - POST.
    - GET.
    - HTTPS.
    - TLS.
  correct:
    - 1
  tema: "Tema 10: Protocolo HTTP"
  explicacion: El método GET nunca debe usarse para contraseñas o datos personales porque la información queda grabada en el historial del navegador y en los registros del servidor [161, 162].
- id: q148
  asignatura: dar
  type: single
  question: "Los códigos HTTP 5xx indican:"
  options:
    - Redirecciones del navegador.
    - Error del servidor.
    - Error del cliente (URL incorrecta).
    - Respuestas informativas 1xx.
  correct:
    - 1
  tema: "Tema 10: Protocolo HTTP"
  explicacion: La serie 500 indica que la petición era correcta, pero el servidor no pudo completarla debido a un fallo interno en su configuración o software [162, 163].
- id: q149
  asignatura: dar
  type: single
  question: "El método HEAD es equivalente a GET pero:"
  options:
    - Devuelve el cuerpo del mensaje y no cabeceras.
    - Solo devuelve las cabeceras, no el mensaje.
    - Cambia recursos en el servidor.
    - Se usa únicamente para subir archivos.
  correct:
    - 1
  tema: "Tema 10: Protocolo HTTP"
  explicacion: Es útil para verificar si un archivo ha cambiado o existe sin necesidad de descargar todo el contenido, ahorrando ancho de banda [27, 162].
- id: q150
  asignatura: dar
  type: single
  question: ¿Qué sistema de cifrado usa HTTPS?
  options:
    - Solo cifrado simétrico.
    - Solo cifrado asimétrico.
    - Una combinación de clave asimétrica (SSL) y simétrica (TLS).
    - No usa cifrado, solo hashing.
  correct:
    - 2
  tema: "Tema 10: Protocolo HTTP"
  explicacion: "HTTPS utiliza un sistema híbrido: clave asimétrica para identificarse y acordar una clave, y clave simétrica para el intercambio rápido de datos durante la sesión [164, 165]."
- id: q151
  asignatura: dar
  type: single
  question: "El protocolo HTTP:"
  options:
    - Debe comunicar con una capa de sockets de aplicación.
    - Se encuentra por debajo del protocolo FTP.
    - Sirve de base al protocolo TCP.
    - Sirve de base al protocolo UDP.
  correct:
    - 0
  tema: "Tema 10: Protocolo HTTP"
  explicacion: HTTP es un protocolo de la capa de aplicación que, para establecer comunicación, utiliza sockets que operan sobre el protocolo de transporte TCP [1, 2].
- id: q152
  asignatura: dar
  type: single
  question: "Dado el siguiente código HTML: Alternativa A: <x><y><z>… <\\/z><\\/y><\\/x> Alternativa B: <x><y><z>… <\\/x><\\/y><\\/z>. Se puede decir que:"
  options:
    - Tanto la alternativa A como la B son correctas.
    - La alternativa B es correcta porque el anidamiento implica que se cierren primero las tags que primero se abren.
    - La alternativa A es correcta porque el anidamiento implica que se cierren las tags en dicho orden.
    - No se pueden anidar tags.
  correct:
    - 2
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: El estándar HTML exige un anidamiento estricto basado en el principio LIFO (Last In, First Out); la última etiqueta en abrirse debe ser la primera en cerrarse [3, 4].
- id: q153
  asignatura: dar
  type: single
  question: "Sobre la naturaleza de Javascript, es cierto que:"
  options:
    - Es de bajo nivel.
    - Es compilado.
    - Es de tipado fuerte.
    - Todas las respuestas son falsas.
  correct:
    - 3
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: JavaScript es un lenguaje de alto nivel, de tipado débil y es un lenguaje de scripting interpretado por el navegador, no compilado [5, 6].
- id: q154
  asignatura: dar
  type: single
  question: "Alguna de las formas de conseguir dinamismo en una web son:"
  options:
    - Contenido actualizado e interacción con el usuario.
    - Motor de base de datos adecuado y basado en componentes.
    - Contenido excepcional basado en texto.
    - Diseño estático y motor de base de datos adecuado.
  correct:
    - 0
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: Una página web es dinámica cuando su contenido puede cambiar tras la carga y permite al usuario interactuar con los elementos de la interfaz [7, 8].
- id: q155
  asignatura: dar
  type: single
  question: "Dado el siguiente código: <p><b>Texto A<\\/b><\\/p> <p><i>Texto B<\\/i><\\/p>, ¿qué resultado se obtiene?"
  options:
    - Se produce un error porque las etiquetas están mal anidadas.
    - El primer párrafo se muestra en negrita y el segundo en cursiva.
    - El segundo párrafo se muestra en negrita y el primero en cursiva.
    - Ambos párrafos se muestran en negrita.
  correct:
    - 1
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: La etiqueta <b> (bold) define texto en negrita y la etiqueta <i> (italic) define texto en cursiva [9, 10].
- id: q156
  asignatura: dar
  type: single
  question: "Respecto a los diferentes tipos de rejillas en Bootstrap:"
  options:
    - Se pueden combinar según las necesidades del programador.
    - Proporcionan diferentes tipos de rendimiento.
    - No se pueden combinar a no ser que se recompile el código.
    - Ninguna de las respuestas es correcta.
  correct:
    - 0
  tema: "Tema 6: Bootstrap"
  explicacion: Bootstrap permite el uso simultáneo de clases de diferentes tamaños (como col-xs y col-md) para adaptar el diseño a distintas resoluciones [11, 12].
- id: q157
  asignatura: dar
  type: single
  question: ¿Qué se consigue con este código? <meta name=“view” content=“with=device-with, initial – scaler=1”>
  options:
    - Optimización y claridad.
    - Que el código resultante se adapte al tipo de dispositivo.
    - Rejilla para poder insertar los elementos.
    - El código contiene errores de sintaxis.
  correct:
    - 3
  tema: "Tema 6: Bootstrap"
  explicacion: "El código tiene múltiples errores: debe ser 'viewport' en lugar de 'view', 'width' en lugar de 'with' y 'scale' en lugar de 'scaler' [13-15]."
- id: q158
  asignatura: dar
  type: single
  question: "Sobre la Arquitectura basada en componentes, NO es cierto que:"
  options:
    - Describe una aproximación de ingeniería de software al diseño de un sistema.
    - Se enfoca en la descomposición del diseño en componentes funcionales.
    - Es un estilo de diseño para aplicaciones compuestas de componentes individuales.
    - No pone énfasis en que las interfaces estén bien definidas.
  correct:
    - 3
  tema: "Tema 5: Arquitectura de componentes"
  explicacion: Es falso porque esta arquitectura precisamente enfatiza que los componentes expongan interfaces de comunicación bien definidas [3, 4].
- id: q159
  asignatura: dar
  type: single
  question: "Respecto a SOAP en la arquitectura SOA:"
  options:
    - Es la tecnología utilizada para invocar servicios descubiertos y comunicarse con el proveedor.
    - Significa 'System Object Access Protocol'.
    - Es un solo elemento que trabaja de manera individual.
    - Solo existe una definición posible de su uso.
  correct:
    - 0
  tema: "Tema 9: Arquitectura orientada a servicios"
  explicacion: SOAP es el protocolo que permite al consumidor invocar las funcionalidades del servicio web ofrecido por el proveedor [2, 16-18].
- id: q160
  asignatura: dar
  type: single
  question: "Las aplicaciones distribuidas de alto rendimiento (HPC):"
  options:
    - Son aplicaciones que requieren de gran capacidad de cómputo y no pueden ser tratadas por un único superordenador.
    - Se ejecutan de manera óptima en un sistema multiprocesador local.
    - Tiene alta demanda de CPU pero no de memoria.
    - Son independientes del contexto.
  correct:
    - 0
  tema: "Tema 8: Tecnologías Grid de la información"
  explicacion: Las HPC necesitan tal potencia de procesamiento que requieren el uso coordinado de múltiples recursos distribuidos (Grid o Clusters) [19].
- id: q161
  asignatura: dar
  type: single
  question: "En relación con las URLs, es falso que:"
  options:
    - URI puede entenderse como un localizador.
    - URN identifica recursos en la red e indica cómo acceder a ellos.
    - Un ejemplo de URL es 'Protocolo://maquina:puerto/directorio/archivo'.
    - URL permite recuperar recursos de la web.
  correct:
    - 1
  tema: "Tema 10: Protocolo HTTP"
  explicacion: Es falso porque la URN identifica el recurso de forma única pero, a diferencia de la URL, no indica su ubicación ni cómo acceder a él [20, 21].
- id: q162
  asignatura: dar
  type: single
  question: ¿Cuál es la sintaxis correcta para escribir un comentario dentro del código fuente de un documento HTML?
  options:
    - small, medium, large, xlarge.
    - "Modelo: Maneja datos y lógica de negocios."
    - El símbolo *
    - <!-- comentario -->
  correct:
    - 3
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: Los comentarios en HTML comienzan con ''. El navegador ignora por completo todo el contenido que se encuentre entre estos caracteres, lo que permite a los desarrolladores dejar notas explicativas en el código.
- id: q163
  asignatura: dar
  type: single
  question: ¿Cómo se define el DTD (Document Type Definition) en HTML5 a diferencia de las versiones anteriores como HTML4 o XHTML?
  options:
    - Aplicación.
    - "Cliente: ejecuta la aplicación."
    - Diseñado para sustituir HTML.
    - Se reduce a la declaración mínima <!DOCTYPE html> y ya no hace referencia a una URL o un estándar SGML específico.
  correct:
    - 3
  tema: "Tema 10: Protocolo HTTP"
  explicacion: Dado que HTML5 ya no está basado en SGML, la declaración de tipo de documento no necesita cargar un archivo .dtd externo. Su único propósito actual es activar el "modo estándar" (standards mode) en los navegadores web para que rendericen la página correctamente.
- id: q164
  asignatura: dar
  type: single
  question: ¿Cuál era el propósito original del elemento <keygen> en los formularios y cuál es su situación en el estándar HTML5 moderno?
  options:
    - Definir tablas, migrar base de datos, lanzar servidor FTP, renderizar.
    - Su propósito era generar un par de claves criptográficas (pública y privada) para autenticación segura;
    - El método HTTP y el tamaño de respuesta.
    - Indicar el protocolo y puerto obligatorios.
  correct:
    - 1
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: Aunque se introdujo con fuerza al inicio de HTML5, presentaba problemas de consistencia entre navegadores y riesgos de seguridad, por lo que fue retirado y reemplazado por la API Web Crypto de JavaScript.
- id: q165
  asignatura: dar
  type: single
  question: ¿Cuál es el enfoque principal que diferencia a HTML5 de las especificaciones web tradicionales del pasado?
  options:
    - Enlace entre el modelo y la vista ante eventos de usuario.
    - Rejilla para poder insertar los elementos.
    - Un enfoque centrado en la semántica nativa, el soporte multimedia integrado sin plugins y el desarrollo de aplicaciones web...
    - TCP únicamente.
  correct:
    - 2
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: HTML5 nació para estandarizar lo que antes requería herramientas de terceros (como Adobe Flash) introduciendo etiquetas de audio/video y APIs potentes de programación directa.
- id: q166
  asignatura: dar
  type: single
  question: ¿Cuál de los siguientes tipos de entrada fue incorporado en HTML5 para mejorar los formularios?
  options:
    - Mejorar la velocidad del servidor.
    - Monolíticas y fuertemente acopladas.
    - No, debe ir siempre en un archivo externo.
    - Email
  correct:
    - 3
  tema: "Tema 10: Protocolo HTTP"
  explicacion: HTML5 añadió semántica nativa y validaciones automáticas de datos en el cliente introduciendo tipos especializados de input como email, url o date.
- id: q167
  asignatura: dar
  type: single
  question: ¿Qué diferencia conceptual y estructural existe entre una etiqueta cerrada (o elemento vacío) y una abierta en HTML?
  options:
    - Las etiquetas cerradas (o void elements) no contienen texto ni encierran otros elementos, por lo que constan de una sola parte...
    - La especificación ECMAScript del W3C.
    - Ejecutar JavaScript en el servidor.
    - Computación distribuida.
  correct:
    - 0
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: "Es justo el concepto que veíamos corregido en tu primera captura del examen: las etiquetas de contenido necesitan delimitar dónde empieza y dónde acaba su zona de influencia."
- id: q168
  asignatura: dar
  type: single
  question: ¿Qué atributos globales de HTML5 permiten capturar de forma directa eventos que ocurren sobre la ventana global del documento, como la carga completa de la página?
  options:
    - El servidor ha fallado completamente (error 5xx).
    - Cargar CSS, compilar HTML, reiniciar servidor, mostrar resultados.
    - Exclusivo para bases de datos relacionales.
    - El atributo onload aplicado generalmente a la etiqueta <body> (o reflejado en el objeto window).
  correct:
    - 3
  tema: "Tema 3: Lenguaje script de navegador JavaScript"
  explicacion: Estos atributos de evento vinculan el marcado HTML con funciones de JavaScript que se ejecutan automáticamente cuando el navegador detecta una acción o cambio de estado específico del documento.
- id: q169
  asignatura: dar
  type: single
  question: ¿Cuál es la función del elemento <fieldset> dentro de un formulario HTML5 y qué subelemento se utiliza habitualmente para darle un título explícito?
  options:
    - Sustituir el servidor por el cliente.
    - Cambios en el software.
    - Su función es agrupar de forma lógica y visual elementos de formulario relacionados, y se le añade un título mediante la etiqueta...
    - Control de procesos del sistema operativo.
  correct:
    - 2
  tema: "Tema 1: Lenguaje de marcado HTML5"
  explicacion: Ayuda a la accesibilidad y organización del formulario, creando un recuadro visual que engloba campos afines (por ejemplo, los datos de la dirección de envío).
- id: q170
  asignatura: dar
  type: single
  question: ¿Cuál es la finalidad principal de los nuevos elementos de estructura introducidos en HTML5 como <header>, <nav>, <article> o <footer>?
  options:
    - La capacidad de ejecutar JavaScript.
    - Enmaquetado HTML y diseño CSS.
    - Aportar valor semántico al documento, permitiendo que tanto los buscadores (SEO) como las tecnologías asistenciales (lectores de...
    - Se enfoca en la descomposición del diseño en componentes funcionales.
  correct:
