# Banco de preguntas SI
# REGLA: contenido VERBATIM. No editar a mano.
- id: q1
  asignatura: si
  type: single
  question: ¿Cuándo se dice que un agente es racional?
  options:
    - Cuando toma la decisión que maximiza su rendimiento y lo acerca a su objetivo
    - Cuando nunca se equivoca en sus decisiones
    - Cuando funciona sin intervención humana
    - Cuando dispone de sensores y actuadores físicos
  correct:
    - 0
  tema: T1
  explicacion: Un agente es racional cuando toma la decisión que más lo acerca a su objetivo, es decir, que maximiza su rendimiento esperado.
- id: q2
  asignatura: si
  type: single
  question: Según Franklin y Graesser (1997), ¿qué cuatro principios distinguen a un agente del resto de programas?
  options:
    - Autonomía, persistencia, reactividad y habilidad social
    - Sensores, actuadores, memoria y aprendizaje
    - Percepción, razonamiento, actuación y utilidad
    - Creencias, deseos, intenciones y planes
  correct:
    - 0
  tema: T1
  explicacion: Franklin y Graesser señalan autonomía, persistencia del código, reactividad al contexto y habilidad social.
- id: q3
  asignatura: si
  type: single
  question: La racionalidad de un agente debe entenderse…
  options:
    - "Dentro de unos límites: se busca un resultado suficiente sujeto a un margen de error"
    - Como la garantía de un resultado siempre perfecto
    - Solo si el entorno es totalmente observable
    - Únicamente con conocimiento aprendido
  correct:
    - 0
  tema: T1
  explicacion: "La racionalidad es limitada: la decisión es adecuada según la información disponible en ese momento, no un resultado perfecto."
- id: q4
  asignatura: si
  type: single
  question: ¿Qué significa que un agente es autónomo?
  options:
    - Que es capaz de adaptarse a cambios en su entorno
    - Que puede funcionar sin sistema operativo
    - Que puede funcionar en cualquier sistema operativo
    - Ninguna de las anteriores
  correct:
    - 0
  tema: T1
  oficial: true
  explicacion: La capacidad de aprender/adaptarse es lo que dota de autonomía; un agente que solo usa conocimiento a priori no es autónomo.
- id: q5
  asignatura: si
  type: single
  question: "El conocimiento de un agente sobre su entorno NO puede ser:"
  options:
    - A priori
    - Aprendido
    - A priori y además aprender dinámicamente
    - Ninguna de las anteriores
  correct:
    - 3
  tema: T1
  oficial: true
  explicacion: El conocimiento puede ser a priori, aprendido o mixto; por tanto ninguna de las opciones describe algo imposible.
- id: q6
  asignatura: si
  type: single
  question: Una bombilla que se activa al detectar movimiento, ¿es un agente racional?
  options:
    - Sí, porque lee su entorno y reacciona ante él
    - No, porque no existen bombillas inteligentes
    - "No, porque faltan elementos: aprendizaje, toma de decisiones, optimización de utilidad o base de conocimiento"
    - No, porque es solo hardware y el hardware no es programable
  correct:
    - 2
  tema: T1
  oficial: true
  explicacion: "Reaccionar a un estímulo no basta: falta aprendizaje, toma de decisiones y optimización de una función de utilidad o base de conocimiento."
- id: q7
  asignatura: si
  type: single
  question: "Indica la afirmación INCORRECTA:"
  options:
    - En POA cada agente tiene entidad propia, se ejecuta de forma autónoma y se relaciona con otros agentes
    - El término «programación orientada a agentes» surgió en 1997
    - La POA y la POO son, en realidad, lo mismo
    - JADE es un framework específico de programación orientada a agentes
  correct:
    - 2
  tema: T1
  oficial: true
  explicacion: "La POA se explica comparándola con la POO, pero NO son lo mismo: los agentes añaden autonomía fuerte, comportamiento flexible y multi-hilo."
- id: q8
  asignatura: si
  type: single
  question: "Frente a la visión tradicional de objeto, los agentes (Wooldridge) se diferencian en que:"
  options:
    - Tienen autonomía más fuerte, comportamiento flexible y son intrínsecamente multi-hilo
    - Son siempre más rápidos de ejecutar
    - No necesitan sensores ni actuadores
    - Solo existen como entidades físicas
  correct:
    - 0
  tema: T1
  explicacion: Autonomía más fuerte (deciden si atienden peticiones), comportamiento flexible (reactivo/proactivo/social) y al menos un hilo de control por agente.
- id: q9
  asignatura: si
  type: single
  question: Las arquitecturas de agente vistas, ¿qué criterio de clasificación toman?
  options:
    - El lenguaje de programación en que está escrito el agente
    - La ubicación de sensores y actuadores en el software
    - La disposición de los elementos en el hardware
    - Los criterios de decisión al elegir la acción del agente tras un estímulo
  correct:
    - 3
  tema: T2
  oficial: true
  explicacion: La clasificación atiende a cómo decide el agente la acción tras una percepción (reactivo, basado en modelos, objetivos, utilidad).
- id: q10
  asignatura: si
  type: single
  question: "Elige la afirmación INCORRECTA sobre los agentes reactivos simples:"
  options:
    - Siguen un esquema de acción-reacción basado en reglas predefinidas
    - El modelo del entorno permite que las decisiones sean complejas
    - No pueden tener memoria
    - Una misma lectura de los sensores genera siempre la misma acción
  correct:
    - 1
  tema: T2
  oficial: true
  explicacion: Los reactivos simples NO tienen modelo del entorno; deciden solo con la percepción actual.
- id: q11
  asignatura: si
  type: single
  question: "Al introducir un modelo de entorno en un agente reactivo, elige la opción INCORRECTA:"
  options:
    - Se simplifica el diseño de las reglas, ya que el modelo es simple por necesidad
    - Se introduce la posibilidad de tener memoria de sucesos pasados
    - "El diseño de las reglas se hace más complejo: aumenta la casuística"
    - El modelo representa la creencia del agente sobre la situación del entorno
  correct:
    - 0
  tema: T2
  oficial: true
  explicacion: "Añadir un modelo NO simplifica las reglas: las complica, al crecer la casuística que hay que contemplar."
- id: q12
  asignatura: si
  type: single
  question: "Un agente basado en modelos (marca la opción correcta):"
  options:
    - Mantiene un registro parcial del mundo
    - El estado interno tiene en cuenta el historial de percepciones
    - Refleja algunos aspectos que no han sido observados
    - Todas las anteriores son correctas
  correct:
    - 3
  tema: T2
  oficial: true
  explicacion: Combina percepción actual con la anterior, usa estado interno e infiere partes no observadas del mundo.
- id: q13
  asignatura: si
  type: single
  question: "«Un agente basado en modelos determina con exactitud el estado actual de un entorno parcialmente observable». Esta afirmación es:"
  options:
    - Verdadera
    - Dependiendo del enfoque, puede ser verdadera o falsa
    - Es falsa en algunas ocasiones, pero generalmente verdadera
    - Es falsa
  correct:
    - 3
  tema: T2
  oficial: true
  explicacion: Es difícil que un agente determine con exactitud el estado de un entorno parcialmente observable; la incertidumbre puede ser inevitable.
- id: q14
  asignatura: si
  type: single
  question: "En un agente basado en objetivos (BDI), marca la opción INCORRECTA:"
  options:
    - Las creencias equivalen al modelo del entorno
    - Las intenciones se asemejan a las acciones más inmediatas a realizar
    - Los deseos se asemejan a los objetivos a cumplir
    - Ninguna de las anteriores es incorrecta
  correct:
    - 3
  tema: T2
  oficial: true
  explicacion: "En el modelo BDI: creencias = modelo del entorno, deseos = objetivos, intenciones = acciones/planes inmediatos. Las tres afirmaciones son correctas."
- id: q15
  asignatura: si
  type: single
  question: "El proceso de toma de decisión en un agente basado en objetivos:"
  options:
    - Se realiza valorando una estimación del resultado de las posibles acciones
    - Un agente no es un sistema de toma de decisiones, no hay tal proceso
    - Es igual que en los agentes híbridos
    - "No es necesaria la toma de decisión: las acciones están preconfiguradas"
  correct:
    - 0
  tema: T2
  oficial: true
  explicacion: El agente razona sobre qué acciones lograrán el objetivo (búsqueda y planificación), estimando resultados futuros.
- id: q16
  asignatura: si
  type: single
  question: "Un agente basado en objetivos se adapta mejor a situaciones dinámicas porque:"
  options:
    - Las reglas de los sensores se modifican sobre la marcha
    - Al ser más lento, los cambios del entorno se perciben menos
    - No es cierto, se adapta peor
    - Al no basarse en acciones preconfiguradas, valora situaciones no previstas
  correct:
    - 3
  tema: T2
  oficial: true
  explicacion: Razona sobre acontecimientos futuros, por lo que puede afrontar situaciones inicialmente no previstas; permite además cambiar el objetivo sin renegociar reglas.
- id: q17
  asignatura: si
  type: single
  question: "Los agentes basados en utilidad son ideales para:"
  options:
    - Cuando existe una sola alternativa
    - Cuando existen múltiples alternativas
    - Cualquier situación, una o varias alternativas
    - Depende de la programación del agente
  correct:
    - 1
  tema: T2
  oficial: true
  explicacion: La función de utilidad es útil cuando hay varias alternativas y hay que elegir la mejor manera de alcanzar el objetivo.
- id: q18
  asignatura: si
  type: single
  question: "La diferencia entre agentes basados en objetivos y en utilidad es:"
  options:
    - Que el basado en utilidad no suele cumplir los objetivos
    - El uso de una función de utilidad que mapea las creencias del agente
    - Que el basado en objetivos no tiene ninguna utilidad
    - El uso de una función de utilidad que mapea a un número la «felicidad» del agente
  correct:
    - 3
  tema: T2
  oficial: true
  explicacion: La utilidad internaliza la medida de rendimiento asignando a cada estado un número real (la «felicidad» del agente).
- id: q19
  asignatura: si
  type: single
  question: "La gobernanza de datos permite:"
  options:
    - La creación de un canal de comunicación
    - Un diálogo constante para organizar los datos
    - Documentar cada dato de la empresa
    - Todas las anteriores
  correct:
    - 3
  tema: T3
  oficial: true
  explicacion: El gobierno del dato abarca comunicación, organización y documentación de los datos de la organización.
- id: q20
  asignatura: si
  type: single
  question: "La gobernanza de datos NO contempla:"
  options:
    - Una estrategia de seguridad de los datos
    - Una forma documentada de acceder a los datos/información
    - La auditoría de los empleados
    - Unificar fuentes de datos para tomar mejores decisiones
  correct:
    - 2
  tema: T3
  oficial: true
  explicacion: El gobierno del dato no consiste en auditar a los empleados, sino en seguridad, acceso documentado y unificación de fuentes.
- id: q21
  asignatura: si
  type: single
  question: "La jerarquía del conocimiento, de más simple a más complejo, es:"
  options:
    - Información, datos y conocimiento
    - Conocimiento, datos e información
    - Datos, información y conocimiento
    - Ninguna de las anteriores
  correct:
    - 2
  tema: T3
  oficial: true
  explicacion: La pirámide DIKW va de datos (base) → información → conocimiento (cima).
- id: q22
  asignatura: si
  type: single
  question: "Un dato es:"
  options:
    - Una información inferida
    - Un hecho conectado con un evento
    - Un hecho concreto y discreto acerca de un evento
    - Todas las anteriores
  correct:
    - 2
  tema: T3
  oficial: true
  explicacion: Un dato es un hecho concreto y discreto sobre un evento; es la unidad mínima que puede comunicarse o almacenarse.
- id: q23
  asignatura: si
  type: single
  question: "La administración del conocimiento contempla:"
  options:
    - La detección, selección y organización de la información
    - Acceder a los datos/información de manera libre
    - La auditoría de los empleados
    - Unificar fuentes de datos para tomar mejores decisiones
  correct:
    - 0
  tema: T3
  oficial: true
  explicacion: Gestionar el conocimiento implica detectar, seleccionar y organizar la información.
- id: q24
  asignatura: si
  type: single
  question: "Un dato estructurado es aquel que:"
  options:
    - Es una agrupación de datos
    - No tiene orden y se guarda en matrices o vectores
    - Es una cadena de texto
    - Tiene definida su organización, estructura, posición, tamaño y longitud
  correct:
    - 3
  tema: T3
  oficial: true
  explicacion: El dato estructurado tiene definidos organización, estructura, posición, tamaño y longitud (p. ej. campos de una tabla).
- id: q25
  asignatura: si
  type: single
  question: "NO es un dato semiestructurado:"
  options:
    - Un año de nacimiento
    - Una página HTML
    - Un archivo XML
    - Un archivo JSON
  correct:
    - 0
  tema: T3
  oficial: true
  explicacion: HTML, XML y JSON son semiestructurados; un año de nacimiento es un dato simple/estructurado.
- id: q26
  asignatura: si
  type: single
  question: "Es correcto decir que:"
  options:
    - Si hay más información, habrá más conocimiento
    - Si hay más información, habrá menos conocimiento
    - Si hay más conocimiento, es porque se tuvo acceso a información
    - Más información genera más conocimiento
  correct:
    - 2
  tema: T3
  oficial: true
  explicacion: El conocimiento se construye a partir de la información (es prerrequisito), pero más información NO implica necesariamente más conocimiento (puede ser redundante o no asimilada).
- id: q27
  asignatura: si
  type: single
  question: "Información es:"
  options:
    - Lo mismo que dato
    - Datos sensibles
    - Datos + significado
    - Metadato
  correct:
    - 2
  tema: T3
  oficial: true
  explicacion: "La información es un conjunto de datos provisto de una relación semántica entre ellos: datos + significado."
- id: q28
  asignatura: si
  type: single
  question: "En inteligencia artificial, una ontología es:"
  options:
    - Una especificación de una conceptualización (significados, símbolos y relaciones de un dominio)
    - Una base de datos relacional optimizada
    - Un lenguaje de programación declarativo
    - Un algoritmo de aprendizaje supervisado
  correct:
    - 0
  tema: T4
  explicacion: "En IA, una ontología es una especificación de una conceptualización: define los símbolos, sus significados, relaciones y axiomas que restringen el vocabulario."
- id: q29
  asignatura: si
  type: single
  question: "Desde una perspectiva filosófica, la ontología (marca la INCORRECTA):"
  options:
    - Estudia la manera en que se relacionan las entidades
    - Es una rama de la metafísica
    - Se ocupa del estudio del ser
    - Solamente trabaja con entidades abstractas
  correct:
    - 3
  tema: T4
  oficial: true
  explicacion: La ontología filosófica clasifica las entidades como abstractas O concretas; no trabaja solo con abstractas.
- id: q30
  asignatura: si
  type: single
  question: "Desde el punto de vista computacional, una ontología (marca la INCORRECTA):"
  options:
    - Puede ser de ámbito general o de un dominio concreto
    - Es una de las formas de representación del conocimiento
    - Se usa únicamente como base de conocimiento en agentes
    - Permite estructurar el conocimiento
  correct:
    - 2
  tema: T4
  oficial: true
  explicacion: La ontología tiene múltiples usos (metadatos, web semántica, integración…), no solo como base de conocimiento de agentes.
- id: q31
  asignatura: si
  type: single
  question: "Los principales elementos de una ontología son:"
  options:
    - Mensajes, conceptos y entidades
    - Conceptos, propiedades y restricciones
    - Entidades, propiedades y conceptos
    - Conceptos, propiedades e instancias
  correct:
    - 1
  tema: T4
  oficial: true
  explicacion: Los tres componentes principales son los conceptos, las propiedades de los conceptos y las restricciones de dichas propiedades.
- id: q32
  asignatura: si
  type: single
  question: "La diferencia principal entre una ontología de dominio y una de nivel superior es que:"
  options:
    - La de dominio no tiene relaciones entre entidades
    - La de nivel superior es necesaria para construir una de dominio, pero no a la inversa
    - La de dominio no permite modelar conceptos abstractos
    - Ninguna de las anteriores
  correct:
    - 1
  tema: T4
  oficial: true
  explicacion: Las ontologías de nivel superior aportan los conceptos generales sobre los que se apoyan las de dominio; la relación no es simétrica.
- id: q33
  asignatura: si
  type: single
  question: "Las dos aproximaciones habituales para construir la jerarquía de conceptos son:"
  options:
    - Top-down y bottom-up
    - Forward y backward
    - Síncrona y asíncrona
    - Estática y dinámica
  correct:
    - 0
  tema: T4
  explicacion: Top-down parte de los conceptos generales hacia los particulares; bottom-up hace lo contrario (y existe también la combinada).
- id: q34
  asignatura: si
  type: single
  question: En el proceso de construcción de una ontología, las instancias se crean…
  options:
    - En el último paso, asignando propiedades concretas a objetos concretos
    - Antes de definir los conceptos
    - Sustituyendo a las restricciones
    - Solo si se usa la estrategia top-down
  correct:
    - 0
  tema: T4
  explicacion: Tras definir conceptos, propiedades y restricciones, el último paso crea las instancias concretas (p. ej. «Nexus 4» como instancia de Smartphone).
- id: q35
  asignatura: si
  type: single
  question: "RDF está relacionado con XML porque:"
  options:
    - XML es el lenguaje utilizado para la definición de RDF
    - Una de las serializaciones de RDF utiliza el formato XML
    - Las tripletas son una parte fundamental de XML
    - Ninguna de las anteriores
  correct:
    - 1
  tema: T5
  oficial: true
  explicacion: RDF es un modelo abstracto; RDF/XML es una de sus serializaciones (junto a Turtle, N-Triples, JSON-LD).
- id: q36
  asignatura: si
  type: single
  question: "La base estructural de RDF es:"
  options:
    - Las ontologías
    - Una tripleta por cada línea de fichero
    - Los recursos, identificados mediante URIs
    - Los recursos, identificados mediante URLs
  correct:
    - 2
  tema: T5
  oficial: true
  explicacion: RDF describe recursos (cualquier cosa) identificados de forma unívoca mediante URIs.
- id: q37
  asignatura: si
  type: single
  question: "RDF/XML, Turtle, N-Triples y JSON-LD son:"
  options:
    - Lenguajes de programación para generar ontologías
    - Ontologías
    - Entornos de programación para ontologías
    - Diferentes serializaciones de RDF
  correct:
    - 3
  tema: T5
  oficial: true
  explicacion: Son distintas formas de serializar (escribir/leer) el modelo abstracto RDF.
- id: q38
  asignatura: si
  type: single
  question: "Marca la respuesta INCORRECTA en relación con RDF Schema:"
  options:
    - Se construye sobre la base de RDF
    - Es necesario para la generación de RDF
    - Es el lenguaje más avanzado que existe para crear ontologías
    - Se puede serializar en formatos distintos de RDF/XML
  correct:
    - 2
  tema: T5
  oficial: true
  explicacion: "RDFS no es el más avanzado (OWL lo supera) y NO es necesario para generar RDF: es una capa opcional sobre RDF."
- id: q39
  asignatura: si
  type: single
  question: "En RDFS, el predicado «rdf:type» indica que:"
  options:
    - El sujeto es una instancia del objeto
    - El objeto es una instancia del sujeto
    - El predicado es del tipo indicado
    - No existe tal predicado
  correct:
    - 0
  tema: T5
  oficial: true
  explicacion: rdf:type indica que el sujeto es una instancia del objeto; rdfs:subClassOf indica subclase.
- id: q40
  asignatura: si
  type: single
  question: "OWL añade (indica la opción INCORRECTA):"
  options:
    - Restricciones bidireccionales sobre las tripletas
    - Jerarquía entre clases y subclases
    - La posibilidad de indicar que dos recursos son la misma cosa
    - Ontologías más ricas en metadatos
  correct:
    - 1
  tema: T5
  oficial: true
  explicacion: La jerarquía de clases/subclases ya la aporta RDFS, no es una novedad de OWL. OWL sí añade restricciones bidireccionales, owl:sameAs y mayor expresividad.
- id: q41
  asignatura: si
  type: single
  question: "Uno de los elementos introducidos por OWL es:"
  options:
    - Las tripletas
    - Las clases
    - Las URIs
    - Los axiomas
  correct:
    - 3
  tema: T5
  oficial: true
  explicacion: Tripletas y URIs son de RDF y las clases de RDFS; OWL aporta axiomas para un procesado semántico más rico.
- id: q42
  asignatura: si
  type: single
  question: "El lenguaje SPARQL:"
  options:
    - Permite consultas sobre OWL pero no sobre RDF
    - Es un lenguaje de programación para crear software basado en ontologías
    - Es un lenguaje de búsqueda para bases de datos relacionales
    - Es un lenguaje de búsqueda para ontologías basadas en RDF
  correct:
    - 3
  tema: T5
  oficial: true
  explicacion: SPARQL es el lenguaje de consulta especializado en tripletas RDF; su sintaxis recuerda a SQL.
- id: q43
  asignatura: si
  type: single
  question: "Los SPARQL Endpoints:"
  options:
    - Solo ofrecen interfaz para comunicación automatizada
    - Se comunican con almacenes de tripletas y hacen búsquedas en ellos
    - Permiten búsquedas basadas en el paradigma relacional tradicional
    - Solo permiten búsquedas manuales
  correct:
    - 1
  tema: T5
  oficial: true
  explicacion: Un endpoint SPARQL permite consultar almacenes de tripletas (triple stores), tanto manual como automatizadamente.
- id: q44
  asignatura: si
  type: single
  question: "«Linked Data» es un término que se utiliza para indicar:"
  options:
    - Las tripletas RDF cuando están basadas en recursos
    - El lenguaje de hipertexto basado en enlaces
    - Datos enlazados mediante bases de datos relacionales cruzadas
    - Un paradigma con OWL como formato base
  correct:
    - 0
  tema: T5
  oficial: true
  explicacion: Linked Data designa datos enlazados publicados como tripletas RDF basadas en recursos (URIs), no en bases relacionales ni con OWL como base.
- id: q45
  asignatura: si
  type: single
  question: "Marca la afirmación INCORRECTA sobre los editores de ontologías:"
  options:
    - Sirven para generar una representación RDF de una ontología previamente diseñada
    - Permiten exportar una ontología en diferentes serializaciones
    - Pueden ser de escritorio o web
    - Son capaces de importar ontologías escritas con LaTeX
  correct:
    - 3
  tema: T6
  oficial: true
  explicacion: LaTeX es un formato de salida/documentación; no se importan ontologías escritas en LaTeX.
- id: q46
  asignatura: si
  type: single
  question: ¿Cuál NO es un editor de ontologías?
  options:
    - Toptology
    - NeOn Toolkit
    - SWOOP
    - WebProtégé
  correct:
    - 0
